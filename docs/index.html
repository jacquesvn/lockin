<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1b1b18">
<meta name="description" content="Lockin — a free pocket CS2 coach. A quick quiz builds you a personalised training plan and a daily tracker to stick to it.">
<title>Lockin — your pocket CS2 coach</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon-512.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Lockin">
</head>
<body>
<style>
  :root{
    --stage:oklch(0.128 0.004 100);--bg:oklch(0.168 0.004 100);
    --surface:oklch(0.205 0.005 100);--surface2:oklch(0.248 0.006 100);
    --line:oklch(0.315 0.006 100);--line2:oklch(0.40 0.008 100);
    --text:oklch(0.965 0.004 100);--muted:oklch(0.665 0.006 100);--faint:oklch(0.50 0.006 100);
    --hero:oklch(0.865 0.165 96);--hero2:oklch(0.80 0.16 96);--onhero:oklch(0.20 0.03 96);
    --good:oklch(0.805 0.15 152);--bad:oklch(0.685 0.19 27);--info:oklch(0.78 0.085 225);
    --fd:'Helvetica Neue',Helvetica,Arial,sans-serif;
    --fb:system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif;
    --fm:ui-monospace,'SF Mono','Cascadia Mono',Menlo,Consolas,monospace;
  }
  [data-theme="light"]{
    --stage:oklch(0.90 0.005 95);--bg:oklch(0.948 0.004 95);
    --surface:oklch(0.995 0.003 95);--surface2:oklch(0.922 0.006 95);
    --line:oklch(0.855 0.006 95);--line2:oklch(0.77 0.008 95);
    --text:oklch(0.205 0.006 95);--muted:oklch(0.44 0.006 95);--faint:oklch(0.575 0.006 95);
    --hero:oklch(0.845 0.17 91);--hero2:oklch(0.79 0.16 91);--onhero:oklch(0.18 0.035 91);
    --good:oklch(0.55 0.14 152);--bad:oklch(0.53 0.20 27);
  }
  *{box-sizing:border-box;margin:0;}
  html,body{height:100%;}
  body{background:var(--bg);color:var(--text);font-family:var(--fb);line-height:1.5;-webkit-font-smoothing:antialiased;}
  button{font-family:var(--fb);}
  .dsp{font-family:var(--fd);font-weight:800;text-transform:uppercase;letter-spacing:-0.02em;}
  .ml{font-family:var(--fm);font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:var(--faint);font-weight:600;}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:16px;}
  .wrap{max-width:640px;margin:0 auto;padding:18px 16px 96px;}
  a{color:var(--hero);}

  /* ---------- app shell ---------- */
  #app{min-height:100vh;}
  #side{display:none;}
  #tabbar{position:fixed;bottom:0;left:0;right:0;z-index:40;background:var(--surface);border-top:1px solid var(--line);display:flex;padding:6px 8px calc(6px + env(safe-area-inset-bottom));gap:4px;}
  .tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:transparent;border:none;border-radius:10px;padding:7px 4px;cursor:pointer;color:var(--faint);}
  .tab svg{width:19px;height:19px;}
  .tab span{font-family:var(--fm);font-size:9.5px;letter-spacing:0.12em;font-weight:700;}
  .tab.on{color:var(--hero);background:color-mix(in oklab,var(--hero) 10%, transparent);}
  .scr{display:none;} .scr.show{display:block;animation:lk-rise .22s ease;}

  @media (min-width:720px){
    #app{display:grid;grid-template-columns:236px 1fr;}
    #tabbar{display:none;}
    #side{display:flex;flex-direction:column;gap:22px;position:sticky;top:0;height:100vh;border-right:1px solid var(--line);padding:22px 16px;background:var(--surface);}
    .wrap{max-width:880px;padding:26px 30px 48px;}
    .cols{display:grid;grid-template-columns:1fr 300px;gap:16px;align-items:start;}
    .plan-cols{display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start;}
  }
  .snav{display:flex;flex-direction:column;gap:4px;}
  .snav button{display:flex;align-items:center;gap:10px;background:transparent;border:none;border-radius:10px;padding:10px 12px;cursor:pointer;color:var(--muted);font-family:var(--fm);font-size:12px;font-weight:700;letter-spacing:0.1em;text-align:left;}
  .snav button.on{background:var(--hero);color:var(--onhero);}
  .snav button svg{width:16px;height:16px;}
  .smini{margin-top:auto;border-top:1px solid var(--line);padding-top:16px;display:flex;flex-direction:column;gap:14px;}

  /* ---------- brand ---------- */
  .brand{display:flex;align-items:center;gap:9px;}
  .brand svg{width:22px;height:22px;color:var(--hero);}
  .wordmark{font-family:var(--fd);font-weight:800;font-size:17px;letter-spacing:-0.02em;}
  .wordmark b{color:var(--hero);}

  /* ---------- header ---------- */
  .hd{display:flex;align-items:flex-end;justify-content:space-between;gap:10px;margin-bottom:16px;}
  .hd h1{font-size:30px;line-height:1;}
  .iconbtn{width:38px;height:38px;border-radius:10px;border:1px solid var(--line);background:var(--surface);color:var(--muted);cursor:pointer;display:grid;place-items:center;}
  .iconbtn svg{width:17px;height:17px;}
  .iconbtn:focus-visible,.tab:focus-visible,.snav button:focus-visible,.opt:focus-visible,.drow:focus-visible,.pbtn:focus-visible,.gbtn:focus-visible{outline:2px solid var(--hero);outline-offset:2px;}

  /* ---------- streak hero ---------- */
  .hero-card{position:relative;overflow:hidden;background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:18px;}
  .hero-card::after{content:"";position:absolute;top:-50px;right:-50px;width:220px;height:220px;border-radius:50%;background:radial-gradient(circle,var(--hero),transparent 68%);opacity:.10;pointer-events:none;}
  .hero-row{display:flex;justify-content:space-between;gap:14px;flex-wrap:wrap;}
  .big-n{font-family:var(--fd);font-weight:800;font-size:64px;line-height:.95;letter-spacing:-0.03em;color:var(--hero);}
  .hr-r{text-align:right;}
  .hr-r .n2{font-family:var(--fd);font-weight:800;font-size:26px;letter-spacing:-0.02em;}
  .status-good{color:var(--good);} .status-mut{color:var(--muted);}
  .wk7{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:16px;}
  .wd{text-align:center;}
  .wd .dl{font-family:var(--fm);font-size:9px;letter-spacing:0.1em;color:var(--faint);margin-bottom:4px;}
  .wc{height:30px;border-radius:8px;display:grid;place-items:center;font-family:var(--fm);font-size:12px;font-weight:700;border:1px solid transparent;}
  .wc.done{background:var(--hero);color:var(--onhero);}
  .wc.today{border:1.5px solid var(--hero);color:var(--hero);}
  .wc.rest{border:1px dashed var(--line2);color:var(--faint);}
  .wc.up{background:var(--surface2);color:var(--faint);}
  .wc.miss{border:1px dashed var(--bad);color:var(--bad);}

  /* ---------- divider / section labels ---------- */
  .divi{display:flex;align-items:center;gap:10px;margin:20px 0 10px;}
  .divi .ml{color:var(--muted);} .divi::after{content:"";flex:1;height:1px;background:var(--line);}

  /* ---------- drill rows ---------- */
  .dlist{display:flex;flex-direction:column;gap:8px;}
  .drow{display:flex;gap:12px;align-items:flex-start;background:var(--surface);border:1px solid var(--line);border-left:3px solid var(--line);border-radius:11px;padding:13px 14px;cursor:pointer;transition:border-color .15s,opacity .15s;text-align:left;width:100%;}
  .drow.done{border-left-color:var(--hero);opacity:.72;}
  .dbox{width:26px;height:26px;border-radius:7px;flex:0 0 auto;display:grid;place-items:center;border:1.5px solid var(--line2);background:transparent;transition:all .15s;margin-top:1px;}
  .drow.done .dbox{background:var(--hero);border-color:var(--hero);}
  .dbox svg{width:14px;height:14px;color:var(--onhero);opacity:0;} .drow.done .dbox svg{opacity:1;}
  .dbody{flex:1;min-width:0;}
  .dname{font-weight:600;font-size:14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .drow.done .dname{color:var(--muted);}
  .chip{font-family:var(--fm);font-size:9px;letter-spacing:0.12em;color:var(--hero);border:1px solid var(--hero);border-radius:4px;padding:1px 5px;font-weight:700;}
  .dsub{font-size:12.5px;color:var(--muted);margin-top:2px;}
  .dmeas{font-family:var(--fm);font-size:11px;color:var(--faint);margin-top:5px;}
  .ddur{font-family:var(--fm);font-size:12px;color:var(--faint);white-space:nowrap;margin-top:2px;}

  /* ---------- hand feel ---------- */
  .feelgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin-top:12px;}
  .fbtn{height:40px;border-radius:9px;font-family:var(--fd);font-weight:700;font-size:15px;cursor:pointer;transition:all .12s;background:var(--surface2);color:var(--faint);border:1px solid var(--line);}
  .fbtn.on{background:var(--hero);color:var(--onhero);border-color:var(--hero);}
  .fword{font-family:var(--fm);font-size:11px;letter-spacing:0.12em;text-transform:uppercase;margin-top:10px;font-weight:700;}

  .motto{text-align:center;font-family:var(--fm);font-size:10px;letter-spacing:0.18em;color:var(--faint);margin-top:26px;text-transform:uppercase;}
  .rulecard{border-left:3px solid var(--hero);}
  .rulecard p{font-size:13px;color:var(--muted);margin-top:6px;}

  /* ---------- quiz ---------- */
  .segs{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin:16px 0 22px;}
  .seg{height:4px;border-radius:2px;background:var(--surface2);} .seg.on{background:var(--hero);}
  .qq{font-size:24px;margin:6px 0 4px;}
  .qhint{font-size:13px;color:var(--muted);margin-bottom:16px;}
  .opts{display:flex;flex-direction:column;gap:9px;}
  .opt{display:flex;align-items:center;gap:12px;width:100%;text-align:left;background:var(--surface);border:1.5px solid var(--line);border-radius:12px;padding:14px 15px;cursor:pointer;color:var(--text);font-size:14.5px;transition:border-color .12s,background .12s;}
  .opt.on{border-color:var(--hero);background:color-mix(in oklab,var(--hero) 10%, transparent);}
  .tick{width:21px;height:21px;flex:0 0 auto;border:1.5px solid var(--line2);display:grid;place-items:center;color:transparent;}
  .tick.c{border-radius:50%;} .tick.s{border-radius:6px;}
  .opt.on .tick{background:var(--hero);border-color:var(--hero);color:var(--onhero);}
  .tick svg{width:12px;height:12px;}
  .qnav{display:flex;justify-content:space-between;gap:10px;margin-top:22px;}
  .gbtn{background:transparent;border:1px solid var(--line);color:var(--muted);border-radius:11px;padding:12px 18px;font-family:var(--fm);font-size:12px;font-weight:700;letter-spacing:0.08em;cursor:pointer;}
  .pbtn{background:var(--hero);border:1px solid var(--hero);color:var(--onhero);border-radius:11px;padding:12px 22px;font-family:var(--fm);font-size:12px;font-weight:800;letter-spacing:0.08em;cursor:pointer;}
  .pbtn:hover{background:var(--hero2);}
  .pbtn:disabled{background:var(--surface2);border-color:var(--line);color:var(--faint);cursor:not-allowed;}

  /* generating / reveal */
  .cstage{min-height:60vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:18px;}
  .ring{width:74px;height:74px;border-radius:50%;border:2px solid var(--line);border-top-color:var(--hero);display:grid;place-items:center;animation:spin 1s linear infinite;}
  .ring svg{width:30px;height:30px;color:var(--hero);animation:none;}
  .blink{animation:lk-blink 1.1s steps(1) infinite;}
  .badge{width:88px;height:88px;border-radius:20px;background:var(--hero);color:var(--onhero);display:grid;place-items:center;position:relative;animation:lk-snap .45s cubic-bezier(.2,.9,.2,1) both;}
  .badge svg{width:44px;height:44px;}
  .ping{position:absolute;inset:0;border-radius:20px;border:2px solid var(--hero);animation:lk-ping .9s ease-out both;}
  .rise{animation:lk-rise .5s .15s ease both;}
  .diagcard{border-left:3px solid var(--hero);text-align:left;max-width:430px;width:100%;}
  .diagrow{display:flex;gap:12px;padding:7px 0;border-bottom:1px solid var(--line);} .diagrow:last-child{border-bottom:0;}
  .diagrow .k{font-family:var(--fm);font-size:10.5px;letter-spacing:0.14em;color:var(--faint);flex:0 0 84px;padding-top:3px;}
  .diagrow .v{font-weight:600;font-size:13.5px;}

  /* ---------- plan ---------- */
  .phrow{display:flex;gap:14px;padding:13px 0;border-bottom:1px solid var(--line);align-items:baseline;}
  .phrow:last-child{border-bottom:0;}
  .phnum{font-family:var(--fd);font-weight:800;font-size:30px;color:var(--hero);flex:0 0 34px;line-height:1;}
  .phrow b{font-family:var(--fd);font-weight:800;text-transform:uppercase;letter-spacing:-0.01em;font-size:15px;}
  .phrow .wl{font-family:var(--fm);font-size:10px;letter-spacing:0.12em;color:var(--faint);margin-left:8px;}
  .phrow p{font-size:12.5px;color:var(--muted);margin-top:3px;}
  .rotgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .rotc{background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:10px 12px;}
  .rotc.now{border:1.5px solid var(--hero);background:color-mix(in oklab,var(--hero) 10%, transparent);}
  .rotc .dl2{font-family:var(--fm);font-size:9.5px;letter-spacing:0.14em;color:var(--faint);}
  .rotc .fn2{font-weight:600;font-size:13px;margin-top:3px;}
  .librow{padding:11px 0;border-bottom:1px solid var(--line);} .librow:last-child{border-bottom:0;}
  .librow .cat{font-family:var(--fm);font-size:9.5px;letter-spacing:0.14em;color:var(--hero);font-weight:700;}
  .librow .ln{font-weight:600;font-size:13.5px;display:flex;justify-content:space-between;gap:10px;margin-top:2px;}
  .librow .lm{font-family:var(--fm);font-size:10.5px;color:var(--faint);margin-top:3px;}

  /* ---------- setup ---------- */
  .prof{display:flex;gap:14px;align-items:center;}
  .avatar{width:52px;height:52px;border-radius:13px;background:var(--surface2);display:grid;place-items:center;color:var(--hero);flex:0 0 auto;}
  .avatar svg{width:26px;height:26px;}
  .prof .ph{font-family:var(--fd);font-weight:800;font-size:17px;text-transform:uppercase;}
  .prof .pm{font-family:var(--fm);font-size:10.5px;letter-spacing:0.12em;color:var(--faint);margin-top:3px;}
  .segctl{display:grid;grid-template-columns:1fr 1fr;gap:5px;background:var(--surface2);border:1px solid var(--line);border-radius:11px;padding:4px;}
  .segctl button{border:none;border-radius:8px;padding:9px;font-family:var(--fm);font-size:11px;font-weight:700;letter-spacing:0.1em;cursor:pointer;background:transparent;color:var(--muted);}
  .segctl button.on{background:var(--hero);color:var(--onhero);}
  .datarow{display:flex;align-items:center;gap:12px;width:100%;background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:13px 14px;cursor:pointer;color:var(--text);font-size:14px;text-align:left;}
  .datarow svg{width:17px;height:17px;color:var(--muted);flex:0 0 auto;}
  .datarow small{color:var(--faint);font-size:11.5px;display:block;}
  .foot{text-align:center;font-family:var(--fm);font-size:9.5px;letter-spacing:0.18em;color:var(--faint);margin-top:26px;}

  /* ---------- celebrate overlay ---------- */
  #cele{position:fixed;inset:0;z-index:80;display:none;place-items:center;background:color-mix(in oklab,var(--bg) 88%, transparent);overflow:hidden;}
  #cele.show{display:grid;}
  #cele .scan{position:absolute;left:0;right:0;height:2px;background:var(--hero);opacity:.6;animation:lk-scan 1.1s ease-in-out both;}
  #cele .inner{text-align:center;}
  #cele .ct1{font-family:var(--fd);font-weight:800;font-size:28px;text-transform:uppercase;letter-spacing:-0.02em;margin-top:18px;animation:lk-rise .5s .2s ease both;}
  #cele .ct2{font-family:var(--fm);font-size:12px;letter-spacing:0.18em;color:var(--hero);margin-top:8px;animation:lk-rise .5s .32s ease both;}

  @keyframes lk-snap{from{transform:scale(1.55);opacity:0}to{transform:scale(1);opacity:1}}
  @keyframes lk-ping{from{transform:scale(.7);opacity:.8}to{transform:scale(2.1);opacity:0}}
  @keyframes lk-scan{from{top:0}to{top:100%}}
  @keyframes lk-rise{from{transform:translateY(10px);opacity:0}to{transform:none;opacity:1}}
  @keyframes lk-blink{50%{opacity:.25}}
  @keyframes spin{to{transform:rotate(360deg)}}
  @media (prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important;}}
</style>

<div id="onboard"></div>
<div id="app" style="display:none;">
  <aside id="side"></aside>
  <div id="maincol"><div class="wrap" id="main"></div></div>
</div>
<nav id="tabbar" style="display:none;"></nav>
<div id="cele" aria-live="polite"></div>

<script>
(function(){
  "use strict";
  var KEY="lockin.v1";
  var VERSION="0.3.0";
  var storageOk=true, mem=null;

  /* ---------- svg bits ---------- */
  var RET='<svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square" aria-hidden="true"><path d="M3 9V3h6M23 3h6v6M3 23v6h6M29 23v6h-6"/><path d="M16 8.5v3.5M16 20v3.5M8.5 16h3.5M20 16h3.5"/><circle cx="16" cy="16" r="1.9" fill="currentColor" stroke="none"/></svg>';
  var CHK='<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="square" aria-hidden="true"><path d="M3 8.5l3.5 3.5L13 4.5"/></svg>';
  var GEAR='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="3.2"/><path d="M12 2.8v3M12 18.2v3M2.8 12h3M18.2 12h3M5.5 5.5l2.1 2.1M16.4 16.4l2.1 2.1M18.5 5.5l-2.1 2.1M7.6 16.4l-2.1 2.1"/></svg>';
  var LIST='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square" aria-hidden="true"><path d="M8 6h13M8 12h13M8 18h13M3 6h.5M3 12h.5M3 18h.5"/></svg>';
  var DL='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square" aria-hidden="true"><path d="M12 3v11M7 10l5 5 5-5M4 20h16"/></svg>';
  var UL='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square" aria-hidden="true"><path d="M12 14V3M7 8l5-5 5 5M4 20h16"/></svg>';

  /* ---------- coaching catalog (research-corrected Jul 2026) ---------- */
  function D(t,sub,m,dur,core){return {t:t,sub:sub,m:m,dur:dur,core:!!core};}
  var FOCI={
    cstrafe:{name:"Counter-strafing",why:"Your rifle regains accuracy the instant you slow below ~34% of top speed — a counter-strafe gets you there instantly (not a dead stop, just a slow walk). Highest-leverage fix up to the mid ranks; it matters less at the very top.",drills:[
      D("Peek-stop-tap","aim_botz + cl_showpos — peek, counter-strafe, fire as you stop","velocity under ~34% max at the shot",8,true),
      D("Stop-then-shoot","Recoil Master — A-stop-fire / D-stop-fire, both directions","first bullet inside the head circle",7,true),
      D("20 wide-peek stops","swing wide, plant, one-tap — 10 each side","clean plant before every shot",5,false)]},
    consistency:{name:"Aim consistency",why:"Your aim's already there on good nights. The job is a routine that makes it show up every night — not new skill.",drills:[
      D("Fixed warm-up","identical routine, same order, every session","completed before anything else",10,true),
      D("100 micro-adjust one-taps","aim_botz headshot-only — settle, confirm, click","slow + clean beats fast + sloppy",6,true),
      D("Stop-discipline DM","5 min deathmatch — stop before every shot","zero moving shots",5,false)]},
    placement:{name:"Crosshair placement",why:"Keep the dot at head height and pre-aimed, so you win the first shot before it's a fight.",drills:[
      D("Prefire lines","Yprac Prefire — pre-aim the common angles","head height through the whole route",8,true),
      D("Head-height resets","aim_botz — re-place to head level between taps","no floor-aiming between kills",6,true),
      D("Map walk","walk your main map, crosshair riding each angle","pre-aimed before the angle opens",5,false)]},
    spray:{name:"Spray / recoil",why:"Learn the pattern so your held sprays land instead of leaking off target.",drills:[
      D("AK / M4 patterns","Recoil Master — guided pattern reps","grouping tightens set to set",8,true),
      D("Spray transfers","aim_botz — drag through 2–3 bots","second kill inside the same spray",6,true),
      D("Range bursts","4–6 round bursts at distance","burst lands inside the ring",5,false)]},
    utility:{name:"Utility",why:"Good util wins duels before they're duels — fewer coinflips, more rounds on your terms.",drills:[
      D("5 core smokes","your best map — own server or Yprac","5/5 land without checking lineups",8,true),
      D("2 entry pop-flashes","flashes that support YOUR entries","peek lands before the flash fades",6,true),
      D("Molotov denials","the standard clears for your map","bounce + spread land correctly",5,false)]},
    positioning:{name:"Positioning & game sense",why:"Being in the right place beats out-aiming from the wrong one. Cheaper wins, less variance.",drills:[
      D("Death audit","demo review — one death per round","was the fight avoidable? tally it",10,true),

  var KEYSTONE_ORDER=["cstrafe","consistency","placement","spray","utility","positioning","clutch","entry"];

  var QUIZ=[
    {id:"rank",q:"Where are you roughly?",hint:"Sets the language and how hard we push.",multi:false,opts:[["new","New / Silver (under ~10k)"],["mid","Mid (10–15k)"],["good","Good (15–20k)"],["high","High (20k+)"],["unsure","Not sure"]]},

    {id:"weak",q:"What lets you down most?",hint:"Pick any that ring true — this drives your plan.",multi:true,opts:[["consistency","Inconsistent night to night"],["spray","Spray / recoil control"],["cstrafe","Moving when I shoot"],["placement","Crosshair placement"],["utility","Utility (smokes/flashes)"],["positioning","Positioning / game sense"],["clutch","Clutching under pressure"],["entry","Getting opening kills"]]},
    {id:"time",q:"Time per training day?",hint:"Be honest — a plan you'll actually do beats a perfect one you won't.",multi:false,opts:[["10","10–15 min"],["30","20–30 min"],["45","45+ min"]]},
    {id:"days",q:"Days a week you can train?",hint:"Weekdays, around real life.",multi:false,opts:[["2","1–2"],["4","3–4"],["5","5+"]]},
    {id:"goal",q:"Your #1 goal right now?",hint:"",multi:false,opts:[["consistency","Just be consistent"],["rank","Climb the rank"],["aim","Sharpen my aim"],["sense","Game sense / utility"],["fun","More fun, less tilt"]]}
  ];
  var RANKL={new:"UNDER 10K",mid:"10–15K",good:"15–20K",high:"20K+",unsure:"UNRANKED"};
  var TIMEL={"10":"10–15 MIN","30":"20–30 MIN","45":"45+ MIN"};
  var DAYSL={"2":"1–2 DAYS/WK","4":"3–4 DAYS/WK","5":"5+ DAYS/WK"};

  /* ---------- the coach brain (unchanged logic, tested) ---------- */
  function uniq(a){var o=[],s={};a.forEach(function(x){if(x&&!s[x]){s[x]=1;o.push(x);}});return o;}
  function generatePlan(p){
    var weak=(p.weak||[]).slice();
    var keystone=null;
    for(var i=0;i<KEYSTONE_ORDER.length;i++){if(weak.indexOf(KEYSTONE_ORDER[i])>=0){keystone=KEYSTONE_ORDER[i];break;}}
    if(!keystone)keystone=(p.goal==="consistency")?"consistency":(p.goal==="sense")?"positioning":(p.goal==="aim")?"placement":"cstrafe";
    var weaponFoci=p.weapon==="awp"?["awp"]:p.weapon==="rifle"?["rifle"]:["awp","rifle"];
    var others=weak.filter(function(w){return w!==keystone;});
    var used=uniq([keystone].concat(weaponFoci).concat(others));
    var pool=[keystone,weaponFoci[0],keystone].concat(others.length?others:[weaponFoci[weaponFoci.length-1]]);
    var weekly={0:"rest",5:"match",6:"match"};
    for(var d=0;d<4;d++)weekly[1+d]=pool[d%pool.length];
    var kName=FOCI[keystone].name, wName=weaponFoci.map(function(f){return FOCI[f].name;}).join(" & ");
    var second=others[0]?FOCI[others[0]].name:wName;
    var timeL=p.time==="10"?"10–15":p.time==="30"?"20–30":"45";
    var rankL={new:"newer",mid:"mid-rank",good:"solid",high:"high-level",unsure:""}[p.rank]||"";
    var wpL=p.weapon==="awp"?"AWP":p.weapon==="rifle"?"rifle":"flex";
    var diagnosis="You're a "+(rankL?rankL+" ":"")+wpL+" player whose single biggest lever is <b>"+kName+"</b>. "+
      "The plan makes that automatic first — that's where <b>consistency</b> comes from — then carries it into your <b>"+wName+"</b> and the rounds that decide games. "+
      "You don't need hours: <b>"+timeL+" minutes</b> on your training days, built to actually stick.";
    var phases=[
      {w:"WK 1–4",t:"Foundations",d:"Make "+kName.toLowerCase()+" automatic and lock a fixed warm-up. Raise your floor before chasing the ceiling."},
      {w:"WK 5–8",t:"Sharpen",d:"Carry it into your "+wName+", and start on your next gap ("+second+")."},
      {w:"WK 9–12",t:"Compete",d:"Hold it under pressure — retakes, scrims, ranked — so the good games become your default."}
    ];
    var targets=buildTargets(keystone,weaponFoci);
    return {v:1,profile:p,keystone:keystone,keystoneName:kName,weaponFoci:weaponFoci,used:used,weekly:weekly,phases:phases,diagnosis:diagnosis,targets:targets,days:parseInt(p.days,10)||4};
  }
  function buildTargets(keystone,weaponFoci){
    var t=[];
    var m={cstrafe:["Counter-strafing %","Reach your bracket average, then push a couple of points above (realistic ceiling ~78–82%). Leetify → Aim."],
      consistency:["Aim floor (worst game)","Lift your worst games — fewer bad nights, same ceiling."],
      placement:["Crosshair placement (°)","Lower is better — pre-aim so you shoot first."],
      spray:["Spray accuracy %","Held sprays that land, not leak."],
      utility:["Utility rating","Above your bracket — more rounds won before the aim-duel."],
      positioning:["Deaths / round","Fewer avoidable deaths — check your demos."],
      clutch:["Clutch rating","Win the rounds that swing games."],
      entry:["Opening-duel win %","Positive — win the pick on your terms."]};
    t.push({n:m[keystone][0],h:m[keystone][1]});
    if(keystone!=="consistency")t.push({n:"Consistency (the real goal)",h:"Your worst game rising toward your best. Screenshot Leetify monthly and compare the floor."});
    var wp=weaponFoci[0];
    t.push({n:(wp==="awp"?"AWP":"Rifle")+" accuracy",h:"Fewer wasted shots — track it on csstats.gg."});
    return t.filter(Boolean);
  }

  /* ---------- date/streak core (unchanged, tested) ---------- */
  function two(n){return (n<10?"0":"")+n;}
  function dateKey(d){return d.getFullYear()+"-"+two(d.getMonth()+1)+"-"+two(d.getDate());}
  function parseKey(k){return new Date(k+"T00:00:00");}
  function addDays(d,n){var x=new Date(d);x.setDate(x.getDate()+n);return x;}
  function midnight(d){var x=new Date(d);x.setHours(0,0,0,0);return x;}
  function mondayOf(d){var x=midnight(d);return addDays(x,-((x.getDay()+6)%7));}
  function isFreebie(d){return d.getDay()<1||d.getDay()>4;}
  function computeStreak(st,today){var s=0,d=new Date(today),t=st.sessions[dateKey(d)];if(!t||!t.warm)d=addDays(d,-1);
    while(true){var x=st.sessions[dateKey(d)];if(x&&x.warm){s++;d=addDays(d,-1);}else if(isFreebie(d)){d=addDays(d,-1);}else break;}return s;}
  function weekdayCount(st,mon){var c=0;for(var i=0;i<4;i++){var x=st.sessions[dateKey(addDays(mon,i))];if(x&&x.warm)c++;}return c;}
  function programWeek(plan,today){if(!plan||!plan.created)return 1;var wk=Math.floor((midnight(today)-parseKey(plan.created))/86400000/7)+1;return Math.max(1,Math.min(12,wk));}

  /* ---------- storage ---------- */
  function blank(){return {plan:null,sessions:{},settings:{}};}
  function load(){try{var s=localStorage.getItem(KEY);storageOk=true;if(!s)return blank();var o=JSON.parse(s);o.sessions=o.sessions||{};o.settings=o.settings||{};migrate(o);return o;}catch(e){storageOk=false;return mem||blank();}}
  function save(st){mem=st;try{localStorage.setItem(KEY,JSON.stringify(st));storageOk=true;}catch(e){storageOk=false;}}
  function migrate(o){
    for(var k in o.sessions){var f=o.sessions[k]&&o.sessions[k].feel;if(f&&f>5)o.sessions[k].feel=Math.ceil(f/2);}
    if(o.settings.theme==="auto")delete o.settings.theme;
  }

  /* ---------- TODAY ---------- */
  function weekCells(st,now){
    var mon=mondayOf(now),tk=dateKey(now),names=["M","T","W","T","F","S","S"],todayMid=midnight(now).getTime(),h="";
    for(var k=0;k<7;k++){var day=addDays(mon,k),dk=dateKey(day),s=st.sessions[dk];
      var isT=dk===tk,fut=midnight(day).getTime()>todayMid,req=day.getDay()>=1&&day.getDay()<=4;
      var cls,mark;
      if(s&&s.warm){cls="done";mark="✓";}
      else if(isT){cls="today";mark="●";}
      else if(fut){cls="up";mark="";}
      else if(req){cls="miss";mark="✕";}
      else{cls="rest";mark="—";}
      h+='<div class="wd"><div class="dl">'+names[k]+'</div><div class="wc '+cls+'">'+mark+'</div></div>';
    }
    return h;
  }

  function htmlPlan(st){

    var diag='<div class="card diagcard" style="max-width:none;"><div class="ml" style="margin-bottom:6px;">DIAGNOSIS · FOCUS ▸ '+esc(plan.keystoneName).toUpperCase()+'</div>'+
      '<p style="font-size:13.5px;color:var(--muted);">'+plan.diagnosis+'</p></div>';
    var ph='<div class="divi"><span class="ml">12-WEEK PHASES</span></div><div class="card">';
    for(var i=0;i<plan.phases.length;i++){var P=plan.phases[i];
      ph+='<div class="phrow"><div class="phnum">'+(i+1)+'</div><div><b>'+esc(P.t)+'</b><span class="wl">'+esc(P.w)+'</span><p>'+esc(P.d)+'</p></div></div>';}
    ph+='</div>';
    var rn=["MON","TUE","WED","THU","FRI","SAT","SUN"],map=[1,2,3,4,5,6,0],rot="";
    for(var r=0;r<7;r++){var fk=plan.weekly[map[r]],F=FOCI[fk],isNow=map[r]===dow;
      rot+='<div class="rotc'+(isNow?" now":"")+'"><div class="dl2">'+rn[r]+'</div><div class="fn2">'+(fk==="rest"?"Rest":esc(F.name))+'</div></div>';}
    var rotc='<div class="divi"><span class="ml">WEEKLY FOCUS ROTATION</span></div><div class="rotgrid">'+rot+'</div>';
    var lib='<div class="divi"><span class="ml">DRILL LIBRARY</span></div><div class="card">';
    plan.used.forEach(function(k){var F=FOCI[k];
      F.drills.forEach(function(d){
        lib+='<div class="librow"><div class="cat">'+esc(F.name).toUpperCase()+(k===plan.keystone?' · KEYSTONE':'')+'</div>'+
          '<div class="ln"><span>'+esc(d.t)+'</span><span class="ddur">'+(d.dur?d.dur+"′":"")+'</span></div>'+
          '<div class="lm">MEASURE · '+esc(d.m)+'</div></div>';
      });
    });
    lib+='</div>';
    var tg='<div class="divi"><span class="ml">HOW TO MEASURE IT</span></div><div class="card">';
    plan.targets.forEach(function(t){tg+='<div class="librow"><div class="ln"><span>'+esc(t.n)+'</span></div><div class="lm">'+esc(t.h)+'</div></div>';});
    tg+='</div>';
    return hd+diag+'<div class="plan-cols"><div>'+ph+rotc+'</div><div>'+lib+tg+'</div></div>';
  }

  /* ---------- SETUP ---------- */
  function htmlSetup(st){
    var plan=st.plan,p=plan.profile,streak=computeStreak(st,new Date());
    var hd='<div class="hd"><div><div class="ml">PROFILE &amp; DATA</div><h1 class="dsp">SETUP</h1></div></div>';
    var wp=p.weapon==="awp"?"AWP":p.weapon==="rifle"?"RIFLER":"FLEX";
    var role=(p.role&&p.role!=="unsure")?(" · "+p.role.toUpperCase()):"";
    var prof='<div class="card"><div class="prof"><div class="avatar">'+RET+'</div><div style="flex:1;">'+
      '<div class="ph">'+wp+role+'</div><div class="pm">'+(RANKL[p.rank]||"")+' · FOCUS '+esc(plan.keystoneName).toUpperCase()+' · STREAK '+streak+'</div></div>'+
      '<button class="gbtn" data-act="retake">RETAKE</button></div></div>';
    var app='<div class="divi"><span class="ml">APPEARANCE</span></div>'+
      '<div class="segctl"><button data-theme-set="dark" class="'+(curTheme(st)==="dark"?"on":"")+'">DARK</button><button data-theme-set="light" class="'+(curTheme(st)==="light"?"on":"")+'">LIGHT</button></div>';
    var data='<div class="divi"><span class="ml">DATA · LOCAL ONLY</span></div>'+
      '<div style="display:flex;flex-direction:column;gap:8px;">'+
      '<button class="datarow" data-act="export">'+DL+'<span>Export backup<small>Everything as a .json file — plan, streak, sessions</small></span></button>'+
      '<button class="datarow" data-act="import">'+UL+'<span>Restore backup<small>Load a previously exported file</small></span></button>'+
      '<input type="file" id="impF" accept="application/json" style="display:none;"></div>'+
      (storageOk?'':'<div class="ml" style="color:var(--bad);margin-top:8px;">⚠ STORAGE BLOCKED — EXPORT TO KEEP YOUR DATA</div>');
    return hd+prof+app+data+'<div class="foot">LOCKIN · FREE FOREVER · NO ACCOUNT · v'+VERSION+'</div>';
  }

  /* ---------- interactions ---------- */
  function wire(st){
    var root=document.body;
    var gos=root.querySelectorAll("[data-go]");
    for(var i=0;i<gos.length;i++)(function(b){b.onclick=function(){go(b.getAttribute("data-go"));};})(gos[i]);
    var th=root.querySelectorAll("[data-theme-set]");
    for(var t=0;t<th.length;t++)(function(b){b.onclick=function(){setTheme(b.getAttribute("data-theme-set"));};})(th[t]);
    var rk=root.querySelectorAll('[data-act="retake"]');
    for(var r=0;r<rk.length;r++)rk[r].onclick=retake;
    var dr=root.querySelectorAll("[data-drill]");
    for(var d=0;d<dr.length;d++)(function(b){b.onclick=function(){toggleDrill(parseInt(b.getAttribute("data-drill"),10));};})(dr[d]);
    var fb=root.querySelectorAll("[data-feel]");
    for(var f=0;f<fb.length;f++)(function(b){b.onclick=function(){setFeel(parseInt(b.getAttribute("data-feel"),10));};})(fb[f]);
    var ex=root.querySelector('[data-act="export"]');
    if(ex)ex.onclick=function(){var b=new Blob([JSON.stringify(load(),null,2)],{type:"application/json"});var a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="lockin-backup-"+dateKey(new Date())+".json";a.click();};
    var im=root.querySelector('[data-act="import"]');
    if(im)im.onclick=function(){document.getElementById("impF").click();};
    var inf=document.getElementById("impF");
    if(inf)inf.onchange=function(e){var f=e.target.files[0];if(!f)return;var rd=new FileReader();
      rd.onload=function(){try{var d2=JSON.parse(rd.result);if(d2&&d2.sessions){d2.settings=d2.settings||{};save(d2);render();}else alert("That file didn't look right.");}catch(x){alert("Couldn't read that file.");}};
      rd.readAsText(f);};
  }

  function toggleDrill(i){
    var st=load();var plan=st.plan,now=new Date(),tk=dateKey(now),dow=now.getDay();
    var F=FOCI[plan.weekly[dow]];if(!F||plan.weekly[dow]==="rest")return;
    var s=st.sessions[tk]||{warm:false,deep:false,feel:0,drills:{}};
    s.drills=s.drills||{};
    var coreDoneBefore=F.drills.every(function(d,ix){return !d.core||s.drills[ix];});
    s.drills[i]=!s.drills[i];
    var any=F.drills.some(function(d,ix){return s.drills[ix];});
    if(any)s.warm=true;else{s.warm=false;s.deep=false;}
    var coreDone=F.drills.every(function(d,ix){return !d.core||s.drills[ix];});
    s.deep=F.drills.every(function(d,ix){return s.drills[ix];});
    st.sessions[tk]=s;save(st);
    if(coreDone&&!coreDoneBefore)celebrate(computeStreak(st,new Date()));
    render();
  }
  function setFeel(v){
    var st=load(),tk=dateKey(new Date());
    var s=st.sessions[tk]||{warm:false,deep:false,feel:0,drills:{}};
    s.feel=(s.feel===v?0:v);st.sessions[tk]=s;save(st);render();
  }

  var celeT;
  function celebrate(streak){
    var c=document.getElementById("cele");
    c.innerHTML='<div class="scan"></div><div class="inner"><div class="badge" style="margin:0 auto;">'+RET+'<span class="ping"></span></div>'+
      '<div class="ct1">DAY SECURED</div><div class="ct2">STREAK ▸ '+streak+' DAY'+(streak===1?"":"S")+'</div></div>';
    c.classList.add("show");
    clearTimeout(celeT);celeT=setTimeout(function(){c.classList.remove("show");},1700);
    c.onclick=function(){c.classList.remove("show");};
  }

  /* ---------- init ---------- */
  (function(){
    var st=load();applyTheme(curTheme(st));
    if(st.plan)boot("today");else renderOnboard();
  })();
  if('serviceWorker' in navigator && location.protocol.indexOf('http')===0){window.addEventListener('load',function(){navigator.serviceWorker.register('service-worker.js').catch(function(){});});}
  if(typeof module!=="undefined")module.exports={generatePlan:generatePlan,computeStreak:computeStreak,FOCI:FOCI,dateKey:dateKey};
})();
</script>
</body>
</html>
