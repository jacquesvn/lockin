  /* ---------- PROGRESS: calendar + Leetify checkpoints ---------- */
  function htmlProgress(st){
    var plan=st.plan,now=new Date();
    var hd='<div class="hd"><div><div class="ml">TRACK IT</div><h1 class="dsp">PROGRESS</h1></div></div>';
    var vy=viewDate.getFullYear(),vm=viewDate.getMonth();
    var title=viewDate.toLocaleDateString(undefined,{month:"long",year:"numeric"});
    var cal='<div class="card"><div class="calhd"><span class="ml">'+esc(title).toUpperCase()+'</span><span class="nav"><button data-cal="-1" aria-label="Previous month">‹</button><button data-cal="1" aria-label="Next month">›</button></span></div><div class="cal">';
    ["M","T","W","T","F","S","S"].forEach(function(h){cal+='<div class="ch">'+h+'</div>';});
    var first=new Date(vy,vm,1),pad=(first.getDay()+6)%7,dim=new Date(vy,vm+1,0).getDate();
    var tk=dateKey(now),todayMid=midnight(now).getTime();
    var createdMid=(plan&&plan.created)?parseKey(plan.created).getTime():0; // floor the "missed" paint at the plan start
    for(var p=0;p<pad;p++)cal+='<div class="cell pad"></div>';
    for(var d=1;d<=dim;d++){var day=new Date(vy,vm,d),dk2=dateKey(day),s=st.sessions[dk2],cls="cell";
      var dm=midnight(day).getTime(),fut=dm>todayMid,req=isTrainingDay(plan,day),before=dm<createdMid,lab;
      if(s&&s.warm){cls+=s.deep?" deep":" warm";lab=s.deep?"full session":"trained";}
      else if(!fut&&dk2!==tk&&req&&!before){cls+=" miss";lab="missed";}
      else lab=fut?"upcoming":"";
      if(dk2===tk){cls+=" today";lab=(lab?lab+", ":"")+"today";}
      cal+='<div class="'+cls+'" role="img" aria-label="'+day.getDate()+(lab?" — "+lab:"")+'">'+d+'</div>';}
    cal+='</div><div class="calleg"><span><i class="swatch" style="background:color-mix(in oklab,var(--hero) 12%,transparent);border:1px solid var(--hero)"></i>trained</span><span><i class="swatch" style="background:var(--hero)"></i>full session</span><span><i class="swatch" style="background:transparent;border:1px dashed var(--bad)"></i>missed weekday</span></div></div>';
    var pw=programWeek(plan,now);
    var due=pw>=12?"w12":pw>=8?"w8":pw>=4?"w4":"base";
    var mx='<div class="divi"><span class="ml">LEETIFY CHECKPOINTS · WK '+pw+'/12</span></div><div class="card">';
    mx+='<p class="mhow" style="margin-top:0;">Type your Leetify numbers in at the start (BASE) and again at weeks 4 / 8 / 12. The chip shows movement from base.</p>'+'<p class="help" style="margin:0 0 12px;">Optional — Leetify’s free tier covers these. Skip it if you don’t use it: your streak, calendar and drills work without any of it.</p>';
    plan.targets.forEach(function(t,ti){
      var key=tkey(t.n), v=(st.metrics||{})[key]||{};
      var lb=/\(°\)|deaths/i.test(t.n);
      var latest=null;["w12","w8","w4"].some(function(kk){if(v[kk]!=null){latest=v[kk];return true;}return false;});
      var chip;
      if(v.base==null||latest==null)chip='<span class="delta na">—</span>';
      else{var dlt=Math.round((latest-v.base)*100)/100;var better=lb?dlt<0:dlt>0;
        chip=dlt===0?'<span class="delta na">±0</span>':'<span class="delta '+(better?"good":"bad")+'">'+(dlt>0?"+":"")+dlt+(better?" ▲":" ▼")+'</span>';}
      mx+='<div class="metric"><div class="mh"><span class="mname">'+esc(t.n)+'</span>'+chip+'</div><div class="mhow">'+esc(t.h)+benchHint(t.n,plan.profile)+'</div><div class="cps">';
      [["base","BASE"],["w4","WK 4"],["w8","WK 8"],["w12","WK 12"]].forEach(function(cp){
        mx+='<div class="'+(due===cp[0]?"due":"")+'"><label>'+cp[1]+'</label><input type="number" inputmode="decimal" step="any" aria-label="'+esc(t.n)+' — '+cp[1]+'" data-mk="'+key+'" data-mp="'+cp[0]+'" value="'+esc(v[cp[0]]!=null?v[cp[0]]:"")+'" placeholder="—"></div>';});
      mx+='</div></div>';});
    mx+='</div>';
    return hd+insightsCard(st)+cal+deathCard(st)+mx+glossary();
  }
  // These averages come from Premier/Leetify data. The skill bands transfer, but the numbers
  // aren't measured on FACEIT or ESEA — say so rather than passing them off as native.
  function benchHint(name,profile){
    var rank=profile&&profile.rank,pf=profile&&profile.platform,b=null;
    if(/Counter-strafing/i.test(name))b={new:"~62%",mid:"~73%",good:"~76%",high:"~78% (plateau)",unsure:"~74%"}[rank];
    else if(/Crosshair placement/i.test(name))b={new:"~12.4°",mid:"~10.5°",good:"~9.9°",high:"~9.0°",unsure:"~10°"}[rank];
    if(!b)return "";
    var note=(pf&&pf!=="premier")?" (Premier data — treat as a ballpark)":"";
    return ' <span style="color:var(--muted);">— your bracket ('+(rankLabel(profile)||"?")+') averages '+b+note+'.</span>';
  }

    var to=setTimeout(function(){if(!done){done=true;cb("Leetify didn't answer in time. Pick manually below.");}},9000);
    fetch(LFY_API+"/v3/profile?"+q,{method:"GET",credentials:"omit"}).then(function(r){

  /* ---------- v0.7: insights + sparklines ---------- */
  function warmDays(st){var o=[];for(var k in st.sessions){if(st.sessions[k]&&st.sessions[k].warm)o.push(k);}return o.sort();}
  function bestStreak(st){
    var keys=warmDays(st);if(!keys.length)return 0;var best=0;
    for(var i=0;i<keys.length;i++){var s=0,d=parseKey(keys[i]);
      while(true){var x=st.sessions[dateKey(d)];
        if(x&&x.warm){s++;d=addDays(d,-1);}
        else if(!isTrainingDay(st.plan,d)){d=addDays(d,-1);}
        else break;}
      if(s>best)best=s;}
    return best;}
  function weekCounts(st,n){var out=[],mon=mondayOf(new Date());
    for(var w=n-1;w>=0;w--){var start=addDays(mon,-7*w),c=0;
      for(var i=0;i<7;i++){var x=st.sessions[dateKey(addDays(start,i))];if(x&&x.warm)c++;}
      out.push(c);}
    return out;}
  function feelSeries(st,n){var keys=[];for(var k in st.sessions){if(st.sessions[k]&&st.sessions[k].feel>0)keys.push(k);}
    keys.sort();return keys.slice(-n).map(function(k){return st.sessions[k].feel;});}
  /* Charts carry their own numbers. The old version drew an unlabelled sparkline
     stretched to the container width, so eight empty weeks read as a row of dashes
     with one unexplained block on the end — testers found it ambiguous, fairly.
     Every bar now prints its value and the axis says what the ends mean.
     `scale` fixes the top of the axis (hand feel is always 1-5); omit it and the
     chart scales to its own tallest bar. */
  function barChart(vals,opts){
    if(!vals||!vals.length)return "";
    opts=opts||{};
    var any=false,i;
    for(i=0;i<vals.length;i++)if(vals[i]>0){any=true;break;}
    if(!any&&opts.emptyMsg)return '<div class="chempty">'+opts.emptyMsg+'</div>';
    var max=opts.scale||Math.max.apply(null,vals)||1,cols="";
    for(i=0;i<vals.length;i++){
      var v=vals[i],pct=v>0?Math.max(9,Math.round((v/max)*100)):0,last=(i===vals.length-1);
      cols+='<div class="bcol"><div class="btrack">'+
        (v>0?'<div class="bfill'+(last?" now":"")+'" style="height:'+pct+'%"></div>':'<div class="bzero"></div>')+
        '</div><div class="bval'+(v>0?"":" off")+'">'+v+'</div></div>';
    }
    // below ~4 bars the end labels are wider than the chart, so they would sit off
    // the bars they describe — the bar values alone are clear at that size
    var axis=(vals.length>=4&&(opts.from||opts.to))
      ?'<div class="baxis"><span>'+esc(opts.from||"")+'</span><span>'+esc(opts.to||"")+'</span></div>':'';
    // chart and axis share .binner so the end labels stay under the end bars
    return '<div class="bwrap">'+(opts.label?'<div class="bcap">'+esc(opts.label)+'</div>':'')+
      '<div class="binner"><div class="bchart">'+cols+'</div>'+axis+'</div></div>';
  }
  function insightsCard(st){
    var wds=warmDays(st),cur=computeStreak(st,new Date()),best=bestStreak(st);
    var fs=feelSeries(st,14),avg=fs.length?(fs.reduce(function(a,b){return a+b;},0)/fs.length):0;
    var tiles='<div class="stats4">'+
      '<div class="stt"><div class="v">'+cur+'</div><div class="k">Current streak</div></div>'+
      '<div class="stt"><div class="v">'+best+'</div><div class="k">Best streak</div></div>'+
      '<div class="stt"><div class="v">'+wds.length+'</div><div class="k">Days trained</div></div>'+
      '<div class="stt"><div class="v">'+(avg?avg.toFixed(1):"—")+'</div><div class="k">Avg hand feel</div></div></div>';
    var recent=fs.slice(-8);
    var bars=barChart(weekCounts(st,8),{label:"Sessions each week",from:"8 weeks ago",to:"this week",
      emptyMsg:"No sessions logged yet — your first one shows up here."});
    var feel=barChart(recent,{label:"How your hands felt, out of 5",scale:5,
      from:recent.length>1?recent.length+" sessions ago":"",to:recent.length>1?"most recent":""});
    var rows='<div class="card" style="margin-top:10px;">'+
      '<div class="sparkrow"><div class="sl"><b>Sessions / week</b><span>last 8 weeks</span></div>'+bars+'</div>'+
      '<div class="sparkrow"><div class="sl"><b>Hand feel</b><span>'+(recent.length?"out of 5":"1–5 scale")+'</span></div>'+
        (feel||'<div class="chempty">Rate your hand feel after a session and it charts here.</div>')+'</div></div>';
    return '<div class="divi"><span class="ml">INSIGHTS</span></div>'+tiles+rows+
      '<button class="btncopy" data-sharecard="1" style="margin-top:10px;">⬇ SAVE PROGRESS CARD (PNG)</button>';

  /* ---------- v0.7: death audit (demo review) ---------- */
  var CAUSES=[["aim","Aim"],["pos","Position"],["util","Utility"],["info","Info"],["trade","No trade"]];
  var CAUSE_COL={aim:"var(--bad)",pos:"var(--info)",util:"var(--good)",info:"var(--hero)",trade:"var(--line2)"};
  function reviewTotals(st,days){
    var t={aim:0,pos:0,util:0,info:0,trade:0},now=new Date();
    for(var i=0;i<days;i++){var r=(st.reviews||{})[dateKey(addDays(now,-i))];
      if(r)for(var c in t){if(r[c])t[c]+=r[c];}}

    var tot=reviewTotals(st,30),sum=0;for(var c in tot)sum+=tot[c];
    var body;
    if(sum>0){
      var top=null;for(var k in tot){if(top===null||tot[k]>tot[top])top=k;}
      var lbl=CAUSES.filter(function(x){return x[0]===top;})[0][1];
      var bar='<div class="leakbar">'+CAUSES.map(function(x){
        var pc=(tot[x[0]]/sum)*100;return pc>0?'<i style="width:'+pc.toFixed(1)+'%;background:'+CAUSE_COL[x[0]]+'"></i>':"";}).join("")+'</div>';
      body=bar+'<p class="mhow" style="margin-top:10px;">Last 30 days · <b style="color:var(--text);">'+esc(lbl.toLowerCase())+'</b> is your biggest leak ('+tot[top]+' of '+sum+' deaths). That is the pattern to fix — not your aim.</p>';
    }else body='<p class="mhow" style="margin-top:10px;">Watch a demo and, for each death, tap what <em>actually</em> killed you. After a few sessions the pattern shows up — and patterns are fixable.</p>';
    return '<div class="divi"><span class="ml">DEATH AUDIT</span></div><div class="card">'+
      '<p class="mhow" style="margin-top:0;">One death per round — what was the real cause?</p>'+btns+body+
      (Object.keys(today).length?'<button class="btncopy" data-deathclear="1" style="margin-top:10px;">CLEAR TODAY</button>':"")+'</div>';
  }

  /* ---------- v0.7: match-night gate + stop-loss ---------- */
  /* ---------- arousal reappraisal (match nights) ----------
     The one psychological intervention in this app with FPS-specific, pre-registered
     evidence behind it: Sharpe et al. (2024), Applied Psychology 73(4), N=44 Counter-
     Strike players, within-subjects, counterbalanced. Reading a reappraisal script
     before playing under pressure raised shooting ACCURACY 66%→72% (d=0.51, p=.001).
     It did NOT significantly improve completion time (p=.111), so this must never be
     sold as making you faster — that null is underpowered, i.e. unproven rather than
     disproven. Raw means are shown rather than effect sizes because they are what a
     player can actually interpret. */
  function reappraisalCard(){
    return '<div class="card reapp" style="margin-bottom:12px;">'+
      '<div class="ml" style="color:var(--hero-ink);">NERVES · READ THIS BEFORE YOU QUEUE</div>'+
      '<p class="reapp-body">Heart up. Hands tense. Breathing gone shallow.</p>'+
      // deliberately no claim about reaction speed here: the study found no speed
      // benefit, so the script must not imply one either
      '<p class="reapp-body">That is not a warning that you are about to lose — it is your body getting ready. A racing heart is delivering more oxygen to your brain and your arm. That is what preparing to compete feels like, and the players who hold up under pressure feel it too.</p>'+
      '<p class="reapp-body"><b>You do not need to calm down. You need to let it work.</b></p>'+
      '<p class="reapp-cite">In the one controlled Counter-Strike experiment on this — 44 players, pre-registered — reading a script like this before playing under pressure raised shooting accuracy from <b>66% to 72%</b>. It did <b>not</b> make them faster, only more accurate. University-level players, on a practice map rather than ranked 5v5, measured on a single occasion.</p>'+
      '</div>';
  }
  function gateCard(sess){
    var g=sess.gate||{},losses=sess.losses||0;
    function chk(k,label){return '<button class="gcheck'+(g[k]?" on":"")+'" data-gate="'+k+'" aria-pressed="'+(g[k]?"true":"false")+'"><span class="gbox">'+CHK+'</span><span>'+label+'</span></button>';}
    var stop=losses>=2?'<div class="warnbanner" style="margin-top:13px;">🛑 <b>Stop-loss hit.</b> Two on the bounce — the next one gets played tilted. Call it here and come back warm.</div>':"";
    return '<div class="card gate" style="margin-bottom:12px;"><div class="ml" style="color:var(--hero-ink);">THE GATE · BEFORE YOU QUEUE</div>'+
      chk("warm","I warmed up — not cold-queueing")+
      chk("calm","I'm not tilted or fried")+

  function toggleDrill(i){
    var st=load(),plan=st.plan,act=actDate(),actK=dateKey(act),actDow=act.getDay();
    var F=FOCI[plan.weekly[actDow]];if(!F||plan.weekly[actDow]==="rest")return;
    var s=st.sessions[actK]||{warm:false,deep:false,feel:0,drills:{}};
    s.drills=s.drills||{};
    var coreDoneBefore=F.drills.every(function(d,ix){return !d.core||s.drills[ix];});
    s.drills[i]=!s.drills[i];
    var any=F.drills.some(function(d,ix){return s.drills[ix];});
    if(any)s.warm=true;else{s.warm=false;s.deep=false;}
    var coreDone=F.drills.every(function(d,ix){return !d.core||s.drills[ix];});
    s.deep=drillList(F,plan).every(function(it){return s.drills[it.i];}); // "full session" = all SHOWN drills (lite tier hides non-core)
    st.sessions[actK]=s;save(st);
    if(coreDone&&!coreDoneBefore)celebrate(computeStreak(st,new Date()));
    render();
  }

  /* ---------- guided session mode ---------- */
  var SESS=null, sessKeydown=null, sessReturnFocus=null;
  function fmtT(s){s=Math.max(0,s);var m=Math.floor(s/60),ss=s%60;return m+":"+(ss<10?"0":"")+ss;}
  function coreComplete(F,drills){return F.drills.every(function(d,ix){return !d.core||(drills&&drills[ix]);});}
  function startSession(opts){
    if(SESS)return;                                    // never run two sessions / two intervals at once
    var quick=!!(opts&&opts.quick===true);             // (guard: a click handler may pass an Event)
    var st=load(),plan=st.plan,fk=plan.weekly[new Date().getDay()],F=FOCI[fk];
    if(!F||fk==="rest"||fk==="match")return;
    var list=drillList(F,plan);if(!list.length)return;
    // quick mode: just the single highest-leverage core drill, five minutes, day still counts
    if(quick){var core=list.filter(function(it){return it.d.core;});list=[core[0]||list[0]];}
    // close on clean reps — you keep whatever you did last (skipped in quick mode, no time for it)
    if(!quick)list=list.concat([{d:CALM,i:-1}]);
    var sNow=st.sessions[dateKey(new Date())]||{drills:{}};
    sessReturnFocus=document.activeElement;
    SESS={fk:fk,list:list,idx:0,remain:quick?300:((list[0].d.dur||1)*60),paused:false,timer:null,
      dayKey:dateKey(new Date()),coreWas:coreComplete(F,sNow.drills),quick:quick,mode:"plan"};
    renderSession();
    SESS.timer=setInterval(sessTick,1000);
  }
  // run a coach-built protocol instead of today's generated drills — completion marks the day
  // warm but never writes drill indices, since a protocol's blocks aren't the plan's drills
  function startProtocol(id){
    if(SESS)return;
    var P=null;for(var i=0;i<PROTOCOLS.length;i++)if(PROTOCOLS[i].id===id)P=PROTOCOLS[i];
    if(!P||!P.blocks.length)return;
    sessReturnFocus=document.activeElement;
    SESS={fk:null,protocol:P,list:P.blocks.map(function(b){return {d:b,i:-1};}),idx:0,
      remain:(P.blocks[0].dur||1)*60,paused:false,timer:null,dayKey:dateKey(new Date()),
      coreWas:false,quick:false,mode:"protocol"};
    renderSession();
    SESS.timer=setInterval(sessTick,1000);
  }
  function sessTick(){
    if(!SESS||SESS.paused)return;
    SESS.remain--;
    var el=document.getElementById("sTime");if(el)el.textContent=fmtT(SESS.remain);
    if(SESS.remain<=0){if(el)el.className="stime zero";sessAdvance(true);}   // paint 0:00, then advance
  }
  function sessAdvance(markDone){
    if(!SESS)return;
    var st=load(),F=SESS.fk?FOCI[SESS.fk]:null,tk=SESS.dayKey;   // snapshot day: a session crossing midnight stays on its start day
    if(markDone){
      var s=st.sessions[tk]||{warm:false,deep:false,feel:0,drills:{}};s.drills=s.drills||{};
      var ix=SESS.list[SESS.idx].i;
      if(ix>=0){                                    // a real plan drill
        s.drills[ix]=true;
        s.warm=F?F.drills.some(function(d,j){return s.drills[j];}):true;
        s.deep=SESS.list.every(function(it){return it.i<0||s.drills[it.i];});
      }else s.warm=true;                            // calm reset / protocol block: training happened
      st.sessions[tk]=s;save(st);
    }
    if(SESS.idx+1>=SESS.list.length){endSession();return;}
    SESS.idx++;SESS.remain=(SESS.list[SESS.idx].d.dur||1)*60;SESS.paused=false;renderSession();
  }
  function endSession(){
    if(!SESS)return;
    if(SESS.timer)clearInterval(SESS.timer);
    var st=load(),F=SESS.fk?FOCI[SESS.fk]:null,s=st.sessions[SESS.dayKey]||{drills:{}};
    var doCele=F?(!SESS.coreWas&&coreComplete(F,s.drills)):(SESS.mode==="protocol"&&SESS.idx+1>=SESS.list.length);
    SESS=null;
    var ov=document.getElementById("session");if(ov){ov.classList.remove("show");ov.removeAttribute("role");ov.removeAttribute("aria-modal");}
    if(sessKeydown){document.removeEventListener("keydown",sessKeydown);sessKeydown=null;}
    var app=document.getElementById("app"),tb=document.getElementById("tabbar");
    if(app)app.removeAttribute("inert");if(tb)tb.removeAttribute("inert");
    render();
    if(sessReturnFocus&&sessReturnFocus.focus){try{sessReturnFocus.focus();}catch(_){}}
    sessReturnFocus=null;
    if(doCele)celebrate(computeStreak(load(),new Date()));
  }
  function renderSession(){
    var ov=document.getElementById("session"),F=SESS.fk?FOCI[SESS.fk]:null,d=SESS.list[SESS.idx].d;
    var head=SESS.protocol?esc(SESS.protocol.name).toUpperCase():esc(F.name).toUpperCase();
    var dots="";for(var i=0;i<SESS.list.length;i++)dots+='<span class="sdot'+(i<SESS.idx?" past":i===SESS.idx?" cur":"")+'"></span>';
    ov.setAttribute("role","dialog");ov.setAttribute("aria-modal","true");ov.setAttribute("aria-label","Guided session");
    ov.innerHTML='<div class="sbar"><span class="ml">SESSION · '+head+(SESS.quick?" · QUICK":"")+'</span><button class="siconx" data-sess="end" aria-label="End session">✕</button></div>'+
      '<div class="sdots">'+dots+'</div>'+
      '<div class="sctr"><div class="ml">DRILL '+(SESS.idx+1)+' / '+SESS.list.length+(d.core?" · CORE":"")+'</div>'+
      '<div class="sname dsp">'+esc(d.t)+'</div>'+
      // One labelled fact per line, in the order a player needs them: where to go,
      // what to do, what you're building, the headspace to hold, then a good rep
      // vs a bad rep (green vs red) so right-and-wrong reads at a glance.
      '<div class="sfacts">'+
        (d.where?'<div class="sfact"><span class="sk">MAP</span><span class="sv">'+esc(d.where)+'</span></div>':'')+
        (d.sub?'<div class="sfact"><span class="sk">DO</span><span class="sv">'+esc(d.sub)+'</span></div>':'')+
        (d.goal?'<div class="sfact"><span class="sk">GOAL</span><span class="sv">'+esc(d.goal)+'</span></div>':'')+
        (d.cue?'<div class="sfact"><span class="sk">MINDSET</span><span class="sv tip">'+esc(d.cue)+'</span></div>':'')+
        (d.m?'<div class="sfact"><span class="sk">RIGHT</span><span class="sv good">✓ '+esc(d.m)+'</span></div>':'')+
        (d.rule?'<div class="sfact"><span class="sk">WRONG</span><span class="sv warn">✕ '+esc(d.rule)+'</span></div>':'')+
      '</div>'+
      '<div class="stime'+(SESS.remain<=0?" zero":"")+'" id="sTime">'+fmtT(SESS.remain)+'</div>'+
      '<div class="sctrls"><button class="gbtn" data-sess="pause">'+(SESS.paused?"RESUME":"PAUSE")+'</button>'+
      '<button class="gbtn" data-sess="skip">SKIP ▸</button><button class="pbtn" data-sess="done">DONE ✓</button></div></div>';
    ov.classList.add("show");
    var app=document.getElementById("app"),tb=document.getElementById("tabbar");
    if(app)app.setAttribute("inert","");if(tb)tb.setAttribute("inert","");
    if(!sessKeydown){sessKeydown=function(e){if(e.key==="Escape")endSession();};document.addEventListener("keydown",sessKeydown);}
    var ctrls=ov.querySelectorAll("[data-sess]");
    for(var c=0;c<ctrls.length;c++)(function(b){b.onclick=function(){var a=b.getAttribute("data-sess");
      if(a==="pause"){SESS.paused=!SESS.paused;renderSession();}
      else if(a==="skip")sessAdvance(false);
      else if(a==="done")sessAdvance(true);
      else endSession();};})(ctrls[c]);
    var x=ov.querySelector('[data-sess="end"]');
    if(x&&(!document.activeElement||!ov.contains(document.activeElement)))try{x.focus();}catch(_){}
  }

  var celeT, celeKey;
  function celebrate(streak){
    var c=document.getElementById("cele");
    c.innerHTML='<div class="scan"></div><div class="inner"><div class="badge" style="margin:0 auto;">'+RET+'<span class="ping"></span></div>'+
      '<div class="ct1">DAY SECURED</div><div class="ct2">STREAK ▸ '+streak+' DAY'+(streak===1?"":"S")+'</div>'+
      '<div class="ml" style="margin-top:14px;color:var(--faint);">TAP OR PRESS ESC</div></div>';
    c.classList.add("show");
    function done(){c.classList.remove("show");clearTimeout(celeT);if(celeKey){document.removeEventListener("keydown",celeKey);celeKey=null;}}
    clearTimeout(celeT);celeT=setTimeout(done,2600);
    c.onclick=done;
    if(celeKey)document.removeEventListener("keydown",celeKey);
    celeKey=function(e){if(e.key==="Escape"||e.key==="Enter"||e.key===" ")done();};
    document.addEventListener("keydown",celeKey);
  }

  /* ---------- last-resort failure surface ----------
     The desktop app has no devtools, so an uncaught error used to leave a silent blank window
     with nothing to report. If BOTH the app and the onboarding are empty, the user is staring at
     nothing — take over with the recovery screen so the error names itself. */
  function surfaceFailure(err){
    try{
      var app=document.getElementById("app"),main=document.getElementById("main"),ob=document.getElementById("onboard");
      var appBlank=!main||!main.innerHTML.replace(/\s/g,"")||!app||app.style.display==="none";
      var obBlank=!ob||!ob.innerHTML.replace(/\s/g,"")||ob.style.display==="none";
      if(appBlank&&obBlank)renderRecovery(err);
    }catch(_){}
  }
  window.addEventListener("error",function(e){surfaceFailure((e&&e.error)||(e&&e.message));});
  window.addEventListener("unhandledrejection",function(e){surfaceFailure(e&&e.reason);});

  /* ---------- init ---------- */
  (function(){
    var st=load();applyTheme(curTheme(st));
    if(st.plan)boot("today");else renderOnboard();
  })();
  if(isNative||("Notification" in window))setInterval(reminderTick,30000);
  // quiet auto-check shortly after launch; failures stay silent (offline is normal, not an error)
  if(isNative)setTimeout(function(){checkUpdate(false);},4000);
  // A stale service worker in the DESKTOP webview is catastrophic: it shadows every future
  // build and survives reinstalls (that's what trapped the app on v1 — see the v0.9.4 self-heal).
  // So this is checked two independent ways. isNative depends on window.__TAURI__ having loaded;
  // the Tauri ORIGIN is knowable synchronously from location, so an injection race can't re-arm it.
  function isTauriOrigin(loc){
    var h=(loc&&loc.hostname)||"", p=(loc&&loc.protocol)||"";
    return h==="tauri.localhost"||h==="tauri"||p==="tauri:";
  }
  function shouldRegisterSW(nav,loc,native){
    if(!nav||!("serviceWorker" in nav))return false;   // unsupported
    if(native)return false;                            // desktop bridge present
    if(isTauriOrigin(loc))return false;                // desktop origin, even if the bridge hasn't loaded
    return String((loc&&loc.protocol)||"").indexOf("http")===0;
  }
  if(shouldRegisterSW(navigator,location,isNative)){
    var hadController=!!navigator.serviceWorker.controller, refreshing=false;
    window.addEventListener('load',function(){navigator.serviceWorker.register('service-worker.js').catch(function(){});});
    navigator.serviceWorker.addEventListener('controllerchange',function(){
      if(!hadController||refreshing)return;   // first install: no reload. Later update: refresh to the new version.
      refreshing=true;location.reload();
    });
  }
  if(typeof module!=="undefined")module.exports={generatePlan:generatePlan,computeStreak:computeStreak,FOCI:FOCI,dateKey:dateKey,richText:richText,validBackup:validBackup,buildTargets:buildTargets,tkey:tkey,drillList:drillList,programWeek:programWeek,isTrainingDay:isTrainingDay,bestStreak:bestStreak,weekCounts:weekCounts,reviewTotals:reviewTotals,barChart:barChart,MAPS:MAPS,shouldRegisterSW:shouldRegisterSW,isTauriOrigin:isTauriOrigin,CALM:CALM,PROTOCOLS:PROTOCOLS,trainingDayCount:trainingDayCount,weekdayCount:weekdayCount,missedYesterday:missedYesterday,QUIZ:QUIZ,rankLabel:rankLabel,benchHint:benchHint,lfyParseId:lfyParseId,lfyPct:lfyPct,lfySuggest:lfySuggest,lfyProfileUrl:lfyProfileUrl,LFY_BENCH:LFY_BENCH,updateBanner:updateBanner,UPD:UPD,planReview:planReview,applyReview:applyReview,lapseInfo:lapseInfo,lapseCard:lapseCard,warmDays:warmDays,reappraisalCard:reappraisalCard,practiceCard:practiceCard};
})();
