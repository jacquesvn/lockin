<body>
<style>
  :root{
    --stage:oklch(0.128 0.004 100);--bg:oklch(0.168 0.004 100);
    --surface:oklch(0.205 0.005 100);--surface2:oklch(0.248 0.006 100);
    --line:oklch(0.315 0.006 100);--line2:oklch(0.40 0.008 100);
    --text:oklch(0.965 0.004 100);--muted:oklch(0.665 0.006 100);--faint:oklch(0.625 0.006 100);
    --hero:oklch(0.865 0.165 96);--hero2:oklch(0.80 0.16 96);--onhero:oklch(0.20 0.03 96);--hero-ink:oklch(0.865 0.165 96);
    --good:oklch(0.805 0.15 152);--bad:oklch(0.685 0.19 27);--info:oklch(0.78 0.085 225);
    --fd:'Helvetica Neue',Helvetica,Arial,sans-serif;
    --fb:system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif;
    --fm:ui-monospace,'SF Mono','Cascadia Mono',Menlo,Consolas,monospace;
  }
  [data-theme="light"]{
    --stage:oklch(0.90 0.005 95);--bg:oklch(0.948 0.004 95);
    --surface:oklch(0.995 0.003 95);--surface2:oklch(0.922 0.006 95);
    --line:oklch(0.855 0.006 95);--line2:oklch(0.77 0.008 95);
    --text:oklch(0.205 0.006 95);--muted:oklch(0.44 0.006 95);--faint:oklch(0.495 0.006 95);
    --hero:oklch(0.845 0.17 91);--hero2:oklch(0.79 0.16 91);--onhero:oklch(0.18 0.035 91);--hero-ink:oklch(0.585 0.13 84);
    --good:oklch(0.55 0.14 152);--bad:oklch(0.53 0.20 27);
  }
  *{box-sizing:border-box;margin:0;}
  html,body{height:100%;}
  /* reserve the scrollbar always, or short screens (Today) sit 15px wider than
     long ones and the whole layout jumps sideways when you switch tabs */
  html{scrollbar-gutter:stable;}
  body{background:var(--bg);color:var(--text);font-family:var(--fb);line-height:1.5;-webkit-font-smoothing:antialiased;}
  button{font-family:var(--fb);}
  .dsp{font-family:var(--fd);font-weight:800;text-transform:uppercase;letter-spacing:-0.02em;}
  .ml{font-family:var(--fm);font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:var(--faint);font-weight:600;}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:16px;}
  .wrap{max-width:640px;margin:0 auto;padding:18px 16px 96px;}
  /* Vertical rhythm on these screens comes from .divi (20px above, 10px below).
     Where two blocks stack with no divider between them they collided at 0px —
     these are the three places that happens. */
  .hero-card + .cuebar{margin-top:10px;}
  .diagcard + .plan-cols{margin-top:10px;}
  .btncopy + .card{margin-top:10px;}
  a{color:var(--hero-ink);}

  /* ---------- app shell ---------- */
  #app{min-height:100vh;}
  #side{display:none;}
  #tabbar{position:fixed;bottom:0;left:0;right:0;z-index:40;background:var(--surface);border-top:1px solid var(--line);display:flex;padding:6px 8px calc(6px + env(safe-area-inset-bottom));gap:4px;}
  .tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:transparent;border:none;border-radius:10px;padding:7px 4px;cursor:pointer;color:var(--faint);}
  .tab svg{width:19px;height:19px;}
  .tab span{font-family:var(--fm);font-size:9.5px;letter-spacing:0.12em;font-weight:700;}
  .tab.on{color:var(--hero);background:color-mix(in oklab,var(--hero) 10%, transparent);}
  .scr{display:none;} .scr.show{display:block;animation:lk-rise .22s ease;}

  @media (min-width:720px){
    #app{display:grid;grid-template-columns:236px 1fr;}
    #tabbar{display:none;}
    #side{display:flex;flex-direction:column;gap:22px;position:sticky;top:0;height:100vh;border-right:1px solid var(--line);padding:22px 16px;background:var(--surface);}
    .wrap{max-width:880px;padding:26px 30px 48px;}
    .cols{display:grid;grid-template-columns:1fr 300px;gap:16px;align-items:start;}
    .plan-cols{display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start;}
  }
  .snav{display:flex;flex-direction:column;gap:4px;}
  .snav button{display:flex;align-items:center;gap:10px;background:transparent;border:none;border-radius:10px;padding:10px 12px;cursor:pointer;color:var(--muted);font-family:var(--fm);font-size:12px;font-weight:700;letter-spacing:0.1em;text-align:left;}
  .snav button.on{background:var(--hero);color:var(--onhero);}
  .snav button svg{width:16px;height:16px;}
  .smini{margin-top:auto;border-top:1px solid var(--line);padding-top:16px;display:flex;flex-direction:column;gap:14px;}

  /* ---------- brand ---------- */
  .brand{display:flex;align-items:center;gap:9px;}
  .brand svg{width:22px;height:22px;color:var(--hero);}
  .wordmark{font-family:var(--fd);font-weight:800;font-size:17px;letter-spacing:-0.02em;}
  .wordmark b{color:var(--hero);}

  /* ---------- header ---------- */
  .hd{display:flex;align-items:flex-end;justify-content:space-between;gap:10px;margin-bottom:16px;}
  .hd h1{font-size:30px;line-height:1;}
  .iconbtn{width:38px;height:38px;border-radius:10px;border:1px solid var(--line);background:var(--surface);color:var(--muted);cursor:pointer;display:grid;place-items:center;}
  .iconbtn svg{width:17px;height:17px;}
  .iconbtn:focus-visible,.tab:focus-visible,.snav button:focus-visible,.opt:focus-visible,.drow:focus-visible,.pbtn:focus-visible,.gbtn:focus-visible{outline:2px solid var(--hero);outline-offset:2px;}

  /* ---------- streak hero ---------- */
  .hero-card{position:relative;overflow:hidden;background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:18px;}
  .hero-card::after{content:"";position:absolute;top:-50px;right:-50px;width:220px;height:220px;border-radius:50%;background:radial-gradient(circle,var(--hero),transparent 68%);opacity:.10;pointer-events:none;}
  .hero-row{display:flex;justify-content:space-between;gap:14px;flex-wrap:wrap;}
  .big-n{font-family:var(--fd);font-weight:800;font-size:64px;line-height:.95;letter-spacing:-0.03em;color:var(--hero);}
  .hr-r{text-align:right;}
  .hr-r .n2{font-family:var(--fd);font-weight:800;font-size:26px;letter-spacing:-0.02em;}
  .status-good{color:var(--good);} .status-mut{color:var(--muted);}
  .wk7{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:16px;}
  .wd{text-align:center;}
  .wd .dl{font-family:var(--fm);font-size:9px;letter-spacing:0.1em;color:var(--faint);margin-bottom:4px;}
  .wc{height:30px;border-radius:8px;display:grid;place-items:center;font-family:var(--fm);font-size:12px;font-weight:700;border:1px solid transparent;}
  .wc.done{background:var(--hero);color:var(--onhero);}
  .wc.today{border:1.5px solid var(--hero);color:var(--hero);}
  .wc.rest{border:1px dashed var(--line2);color:var(--faint);}
  .wc.up{background:var(--surface2);color:var(--faint);}
  .wc.miss{border:1px dashed var(--bad);color:var(--bad);}

  /* ---------- divider / section labels ---------- */
  .divi{display:flex;align-items:center;gap:10px;margin:20px 0 10px;}
  .divi .ml{color:var(--muted);} .divi::after{content:"";flex:1;height:1px;background:var(--line);}

  /* ---------- drill rows ---------- */
  .dlist{display:flex;flex-direction:column;gap:8px;}
  .drow{display:flex;gap:12px;align-items:flex-start;color:var(--text);background:var(--surface);border:1px solid var(--line);border-left:3px solid var(--line);border-radius:11px;padding:13px 14px;cursor:pointer;transition:border-color .15s,opacity .15s;text-align:left;width:100%;}
  .drow.done{border-left-color:var(--hero);opacity:.72;}
  .dbox{width:26px;height:26px;border-radius:7px;flex:0 0 auto;display:grid;place-items:center;border:1.5px solid var(--line2);background:transparent;transition:all .15s;margin-top:1px;}
  .drow.done .dbox{background:var(--hero);border-color:var(--hero);}
  .dbox svg{width:14px;height:14px;color:var(--onhero);opacity:0;} .drow.done .dbox svg{opacity:1;}
  .dbody{flex:1;min-width:0;}
  .dname{font-weight:600;font-size:14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .drow.done .dname{color:var(--muted);}
  .chip{font-family:var(--fm);font-size:9px;letter-spacing:0.12em;color:var(--hero-ink);border:1px solid var(--hero-ink);border-radius:4px;padding:1px 5px;font-weight:700;}
  .dwhere{font-family:var(--fm);font-size:11px;color:var(--hero-ink);margin-top:3px;}
  .dsub{font-size:12.5px;color:var(--muted);margin-top:2px;}
  .dmeas{font-family:var(--fm);font-size:11px;color:var(--faint);margin-top:5px;}
  .ddur{font-family:var(--fm);font-size:12px;color:var(--faint);white-space:nowrap;margin-top:2px;}

  /* ---------- hand feel ---------- */
  .feelgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin-top:12px;}
  .fbtn{height:40px;border-radius:9px;font-family:var(--fd);font-weight:700;font-size:15px;cursor:pointer;transition:all .12s;background:var(--surface2);color:var(--faint);border:1px solid var(--line);}
  .fbtn.on{background:var(--hero);color:var(--onhero);border-color:var(--hero);}
  .fword{font-family:var(--fm);font-size:11px;letter-spacing:0.12em;text-transform:uppercase;margin-top:10px;font-weight:700;}

  .motto{text-align:center;font-family:var(--fm);font-size:10px;letter-spacing:0.18em;color:var(--faint);margin-top:26px;text-transform:uppercase;}
  .rulecard{border-left:3px solid var(--hero);}
  .rulecard p{font-size:13px;color:var(--muted);margin-top:6px;}

  /* ---------- quiz ---------- */
  /* auto-flow so the bar stays one row whatever QUIZ.length is — this was pinned
     to 7 columns and the 8th question silently wrapped onto a second line */
  .segs{display:grid;grid-auto-flow:column;grid-auto-columns:1fr;gap:5px;margin:16px 0 22px;}
  .seg{height:4px;border-radius:2px;background:var(--surface2);} .seg.on{background:var(--hero);}
  .qq{font-size:24px;margin:6px 0 4px;}
  .qhint{font-size:13px;color:var(--muted);margin-bottom:16px;}
  .lfy{margin-bottom:16px;padding:14px;}
  .lfyin{display:flex;gap:8px;}
  .lfyin input{flex:1;min-width:0;background:var(--sunk);border:1px solid var(--line);color:var(--text);
    border-radius:8px;padding:10px 11px;font:inherit;font-size:13px;}
  .lfyin input:focus{outline:none;border-color:var(--hero);}
  .lfyname{font-weight:800;margin:10px 0 8px;font-size:15px;}
  .lfynums{display:grid;grid-template-columns:1fr;gap:2px;}
  .lfyrow{display:flex;justify-content:space-between;gap:12px;font-size:12.5px;
    color:var(--muted);padding:3px 0;border-bottom:1px solid var(--line);}
  .lfyrow b{color:var(--text);font-variant-numeric:tabular-nums;}
  .lfyattr{display:flex;gap:14px;flex-wrap:wrap;margin-top:10px;}
  .lfylink{color:#F84982;font-weight:700;text-decoration:underline;font-size:12px;}
  .lfybadge{height:38px;width:auto;display:block;}
  .lfybadge.lt{display:none;}
  [data-theme="light"] .lfybadge.dk{display:none;}
  [data-theme="light"] .lfybadge.lt{display:block;}
  .lfyattr{align-items:center;}
  .lfywhy{font-size:12.5px;color:var(--muted);padding:3px 0;}
  .lfywhy:before{content:"▸ ";color:var(--hero);}
  .lfyerr{margin-top:9px;font-size:12.5px;color:var(--warn,#e5a03c);}
  .opts{display:flex;flex-direction:column;gap:9px;}
  .opt{display:flex;align-items:center;gap:12px;width:100%;text-align:left;background:var(--surface);border:1.5px solid var(--line);border-radius:12px;padding:14px 15px;cursor:pointer;color:var(--text);font-size:14.5px;transition:border-color .12s,background .12s;}
  .opt.on{border-color:var(--hero);background:color-mix(in oklab,var(--hero) 10%, transparent);}
  .tick{width:21px;height:21px;flex:0 0 auto;border:1.5px solid var(--line2);display:grid;place-items:center;color:transparent;}
  .tick.c{border-radius:50%;} .tick.s{border-radius:6px;}
  .opt.on .tick{background:var(--hero);border-color:var(--hero);color:var(--onhero);}
  .tick svg{width:12px;height:12px;}
  .qnav{display:flex;justify-content:space-between;gap:10px;margin-top:22px;}
  .gbtn{background:transparent;border:1px solid var(--line);color:var(--muted);border-radius:11px;padding:12px 18px;font-family:var(--fm);font-size:12px;font-weight:700;letter-spacing:0.08em;cursor:pointer;}
  .pbtn{background:var(--hero);border:1px solid var(--hero);color:var(--onhero);border-radius:11px;padding:12px 22px;font-family:var(--fm);font-size:12px;font-weight:800;letter-spacing:0.08em;cursor:pointer;}
  .pbtn:hover{background:var(--hero2);}
  .pbtn:disabled{background:var(--surface2);border-color:var(--line);color:var(--faint);cursor:not-allowed;}

  /* generating / reveal */
  .cstage{min-height:60vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:18px;}
  .ring{width:74px;height:74px;border-radius:50%;border:2px solid var(--line);border-top-color:var(--hero);display:grid;place-items:center;animation:spin 1s linear infinite;}
  .ring svg{width:30px;height:30px;color:var(--hero);animation:none;}
  .blink{animation:lk-blink 1.1s steps(1) infinite;}
  .badge{width:88px;height:88px;border-radius:20px;background:var(--hero);color:var(--onhero);display:grid;place-items:center;position:relative;animation:lk-snap .45s cubic-bezier(.2,.9,.2,1) both;}
  .badge svg{width:44px;height:44px;}
  .ping{position:absolute;inset:0;border-radius:20px;border:2px solid var(--hero);animation:lk-ping .9s ease-out both;}
  .rise{animation:lk-rise .5s .15s ease both;}
  .diagcard{border-left:3px solid var(--hero);text-align:left;max-width:430px;width:100%;}
  .diagrow{display:flex;gap:12px;padding:7px 0;border-bottom:1px solid var(--line);} .diagrow:last-child{border-bottom:0;}
  .diagrow .k{font-family:var(--fm);font-size:10.5px;letter-spacing:0.14em;color:var(--faint);flex:0 0 84px;padding-top:3px;}
  .diagrow .v{font-weight:600;font-size:13.5px;}

  /* ---------- plan ---------- */
  .phrow{display:flex;gap:14px;padding:13px 0;border-bottom:1px solid var(--line);align-items:baseline;}
  .phrow:last-child{border-bottom:0;}
  .phnum{font-family:var(--fd);font-weight:800;font-size:30px;color:var(--hero);flex:0 0 34px;line-height:1;}
  .phrow b{font-family:var(--fd);font-weight:800;text-transform:uppercase;letter-spacing:-0.01em;font-size:15px;}
  .phrow .wl{font-family:var(--fm);font-size:10px;letter-spacing:0.12em;color:var(--faint);margin-left:8px;}
  .phrow p{font-size:12.5px;color:var(--muted);margin-top:3px;}
  .rotgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .rotc{background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:10px 12px;width:100%;text-align:left;color:var(--text);font-family:var(--fb);cursor:pointer;}
  .rotc:hover{border-color:var(--hero-ink);}
  .rotc.editing{border:1.5px solid var(--hero-ink);}
  .rotc.now{border:1.5px solid var(--hero);background:color-mix(in oklab,var(--hero) 10%, transparent);}
  .rotc .dl2{font-family:var(--fm);font-size:9.5px;letter-spacing:0.14em;color:var(--faint);}
  .rotc .fn2{font-weight:600;font-size:13px;margin-top:3px;}
  .librow{padding:11px 0;border-bottom:1px solid var(--line);} .librow:last-child{border-bottom:0;}
  .libgrid{display:grid;grid-template-columns:1fr;}
  @media (min-width:720px){
    .libgrid{grid-template-columns:repeat(auto-fill,minmax(232px,1fr));column-gap:24px;}
  }
  .librow .cat{font-family:var(--fm);font-size:9.5px;letter-spacing:0.14em;color:var(--hero-ink);font-weight:700;}
  .librow .ln{font-weight:600;font-size:13.5px;display:flex;justify-content:space-between;gap:10px;margin-top:2px;}
  .librow .lm{font-family:var(--fm);font-size:10.5px;color:var(--faint);margin-top:3px;}
  /* the read-ahead "why" — body text you actually read in Plan, so --muted not --faint */
  .librow .lwhy{font-size:12.5px;color:var(--muted);line-height:1.5;margin-top:5px;}
  /* week-4 / week-8 review — a milestone card, so it reads as a moment not a nag */
  .revcard{border-color:color-mix(in oklab,var(--hero) 45%,transparent);margin-bottom:14px;}
  .revrow{font-size:13px;color:var(--muted);padding:5px 0;border-bottom:1px solid var(--line);}
  .revrow:first-of-type{margin-top:8px;}
  .revrow b{color:var(--text);font-variant-numeric:tabular-nums;}
  .revrow.good b{color:var(--good);} .revrow.bad b{color:var(--bad);}
  .revrow.muted{color:var(--faint);}
  .revsug{font-family:var(--fm);font-size:11px;letter-spacing:0.1em;color:var(--hero-ink);margin-top:12px;font-weight:700;}
  .revwhy{font-size:13px;color:var(--muted);line-height:1.5;margin-top:6px;}
  .revacts{display:flex;gap:8px;flex-wrap:wrap;margin-top:13px;}
  /* coming back is not a warning — hero, never --bad. The calendar already shows
     the misses honestly; this card's job is the way forward, not the reprimand. */
  .lapsecard{border-color:color-mix(in oklab,var(--hero) 45%,transparent);margin-bottom:14px;}
  .lapselede{font-size:14px;color:var(--text);line-height:1.5;margin-top:9px;}
  .lapselede b{color:var(--hero-ink);}
  .lapsestats{font-family:var(--fm);font-size:11px;color:var(--faint);letter-spacing:0.04em;margin-top:9px;line-height:1.7;}
  .lapsestats b{color:var(--text);}
  .lapseback{font-size:13px;color:var(--muted);line-height:1.5;margin-top:11px;}
  /* reappraisal script — read, not skimmed, so it gets body-text weight; the
     citation stays visible rather than hidden, because the caveats are the point */
  .reapp{border-color:color-mix(in oklab,var(--hero) 40%,transparent);}
  .reapp-body{font-size:14px;color:var(--text);line-height:1.55;margin-top:10px;}
  .reapp-body b{color:var(--hero-ink);}
  .reapp-cite{font-size:11.5px;color:var(--faint);line-height:1.55;margin-top:13px;
    border-top:1px solid var(--line);padding-top:10px;}
  .reapp-cite b{color:var(--muted);}
  /* mindset / right / wrong, read before training — mirrors the live drill screen */
  .ldwrap{margin-top:8px;display:grid;gap:4px;}
  .ld{display:grid;grid-template-columns:58px 1fr;gap:9px;align-items:baseline;font-size:12px;line-height:1.4;}
  .ld .ldk{font-family:var(--fm);font-size:9px;letter-spacing:0.1em;color:var(--faint);}
  .ld-mind span:last-child{color:var(--hero-ink);font-weight:700;}
  .ld-right span:last-child{color:var(--good);}
  .ld-wrong span:last-child{color:var(--bad);}

  /* ---------- setup ---------- */
  .prof{display:flex;gap:14px;align-items:center;}
  .avatar{width:52px;height:52px;border-radius:13px;background:var(--surface2);display:grid;place-items:center;color:var(--hero);flex:0 0 auto;}
  .avatar svg{width:26px;height:26px;}
  .prof .ph{font-family:var(--fd);font-weight:800;font-size:17px;text-transform:uppercase;}
  .prof .pm{font-family:var(--fm);font-size:10.5px;letter-spacing:0.12em;color:var(--faint);margin-top:3px;}
  .segctl{display:grid;grid-template-columns:1fr 1fr;gap:5px;background:var(--surface2);border:1px solid var(--line);border-radius:11px;padding:4px;}
  .segctl button{border:none;border-radius:8px;padding:9px;font-family:var(--fm);font-size:11px;font-weight:700;letter-spacing:0.1em;cursor:pointer;background:transparent;color:var(--muted);}
  .segctl button.on{background:var(--hero);color:var(--onhero);}
  .datarow{display:flex;align-items:center;gap:12px;width:100%;background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:13px 14px;cursor:pointer;color:var(--text);font-size:14px;text-align:left;text-decoration:none;}
  .datarow svg{width:17px;height:17px;color:var(--muted);flex:0 0 auto;}
  .datarow small{color:var(--faint);font-size:11.5px;display:block;}
  .foot{text-align:center;font-family:var(--fm);font-size:9.5px;letter-spacing:0.18em;color:var(--faint);margin-top:26px;}

  /* ---------- progress: calendar + metrics ---------- */
  .calhd{display:flex;justify-content:space-between;align-items:center;margin-bottom:11px;}
  .calhd .nav{display:flex;gap:6px;}
  .calhd .nav button{background:var(--surface2);border:1px solid var(--line);border-radius:6px;color:var(--muted);cursor:pointer;width:26px;height:24px;font-size:12px;}
  .calhd .nav button:hover{border-color:var(--hero);}
  .cal{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}
  .cal .ch{font-family:var(--fm);font-size:9px;color:var(--faint);text-align:center;text-transform:uppercase;letter-spacing:0.05em;}
  .cell{aspect-ratio:1;border-radius:8px;background:var(--surface2);border:1px solid var(--line);display:grid;place-items:center;font-size:10.5px;color:var(--faint);font-family:var(--fm);}
  .cell.pad{background:transparent;border:0;}
  .cell.warm{background:color-mix(in oklab,var(--hero) 12%,transparent);border-color:var(--hero);color:var(--hero);font-weight:700;}
  .cell.deep{background:var(--hero);border-color:var(--hero);color:var(--onhero);font-weight:700;}
  .cell.miss{border:1px dashed var(--bad);color:var(--bad);}
  .cell.today{box-shadow:0 0 0 2px var(--hero);}
  .calleg{display:flex;gap:14px;margin-top:11px;font-size:11px;color:var(--faint);flex-wrap:wrap;}
  .calleg span{display:inline-flex;align-items:center;gap:5px;}
  .swatch{width:11px;height:11px;border-radius:3px;display:inline-block;}
  .metric{padding:12px 0;border-bottom:1px solid var(--line);} .metric:last-child{border-bottom:0;padding-bottom:2px;}
  .metric .mh{display:flex;justify-content:space-between;gap:8px;align-items:baseline;}
  .metric .mname{font-weight:600;font-size:13.5px;}
  .delta{font-family:var(--fm);font-size:11px;font-weight:700;padding:2px 7px;border-radius:5px;white-space:nowrap;}
  .delta.good{color:var(--good);background:color-mix(in oklab,var(--good) 12%,transparent);}
  .delta.bad{color:var(--bad);background:color-mix(in oklab,var(--bad) 10%,transparent);}
  .delta.na{color:var(--faint);background:var(--surface2);}
  .mhow{font-family:var(--fm);font-size:10.5px;color:var(--faint);margin:4px 0 9px;line-height:1.5;}
  /* tracks the checkpoint list (base / wk4 / wk8 / wk12) — same reason */
  .cps{display:grid;grid-template-columns:repeat(auto-fit,minmax(64px,1fr));gap:8px;}
  .cps label{font-family:var(--fm);font-size:9px;letter-spacing:0.06em;text-transform:uppercase;color:var(--faint);display:block;margin-bottom:3px;}
  .cps input{width:100%;background:var(--surface2);border:1px solid var(--line);border-radius:7px;padding:6px 8px;color:var(--text);font-family:var(--fm);font-size:12.5px;text-align:center;}
  .cps .due input{border-color:var(--hero);}
  .cps input:focus{outline:none;border-color:var(--hero);}

  /* ---------- v0.5: banners, cue, session, practice, glossary ---------- */
  .warnbanner{background:color-mix(in oklab,var(--bad) 9%,transparent);border:1px solid color-mix(in oklab,var(--bad) 40%,transparent);border-left:3px solid var(--bad);border-radius:11px;padding:11px 13px;font-size:13px;color:var(--text);margin-bottom:12px;}
  .warnbanner b{font-weight:700;}
  /* update notice — sticks to the top of the content column on every tab, so it's
     obvious without covering anything. Slim, yellow-tinted, dismissible. #updbar
     is empty (collapsed) unless there's an update, so it costs no space normally. */
  #updbar{position:sticky;top:0;z-index:30;}
  #updbar:empty{display:none;}
  .updbar-in{display:flex;align-items:center;gap:12px;flex-wrap:wrap;
    background:color-mix(in oklab,var(--hero) 15%,var(--bg));
    border-bottom:1px solid color-mix(in oklab,var(--hero) 55%,transparent);
    padding:10px 16px;}
  .updbar-in .ml{color:var(--hero-ink);font-size:11px;letter-spacing:0.12em;}
  .updbar-sub{font-size:12.5px;color:var(--muted);flex:1;min-width:120px;}
  .updbar-act{display:flex;align-items:center;gap:8px;margin-left:auto;}
  .updbar-go{background:var(--hero);border:1px solid var(--hero);color:var(--onhero);
    border-radius:9px;padding:8px 16px;font-family:var(--fm);font-size:11px;font-weight:800;
    letter-spacing:0.08em;cursor:pointer;}
  .updbar-x{background:transparent;border:none;color:var(--muted);font-size:13px;
    cursor:pointer;padding:6px 8px;line-height:1;}
  .updbar-x:hover{color:var(--text);}
  @media (min-width:720px){.updbar-in{padding:11px 30px;}}
  /* mobile: drop the reassurance line so the bar stays one slim row (label + action) */
  @media (max-width:719px){.updbar-sub{display:none;} .updbar-in{padding:9px 14px;}}
  .cuebar{display:flex;flex-direction:column;gap:2px;width:100%;text-align:left;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:11px 14px;margin-bottom:14px;font-size:13px;color:var(--text);}
  .cuebar.prompt{cursor:pointer;border-style:dashed;}
  .cuebar.prompt:hover{border-color:var(--hero);}
  .bftoggle{background:transparent;border:1px solid var(--line);border-radius:9px;color:var(--muted);cursor:pointer;font-family:var(--fm);font-size:10px;font-weight:700;letter-spacing:0.08em;padding:8px 11px;text-transform:uppercase;}
  .bftoggle:hover{border-color:var(--hero);color:var(--text);}
  .bftoggle.on{border-color:var(--hero);color:var(--hero);}
  .rtoggle{background:var(--surface2);border:1px solid var(--line);border-radius:999px;color:var(--muted);cursor:pointer;font-family:var(--fm);font-size:10px;font-weight:800;letter-spacing:0.12em;padding:7px 18px;flex:0 0 auto;}
  .rtoggle.on{background:var(--hero);border-color:var(--hero);color:var(--onhero);}
  .sessrow{display:grid;grid-template-columns:1fr auto;gap:8px;margin-bottom:12px;}
  .sessrow .startsession,.sessrow .quickbtn{margin-bottom:0;}
  .sessrow .quickbtn{white-space:nowrap;padding-left:16px;padding-right:16px;}
  .startsession{width:100%;background:var(--hero);color:var(--onhero);border:none;border-radius:12px;padding:14px;font-family:var(--fm);font-weight:800;font-size:12px;letter-spacing:0.1em;cursor:pointer;margin-bottom:12px;}
  .startsession:hover{background:var(--hero2);}
  .field{margin-top:0;} .field label{font-family:var(--fm);font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--faint);display:block;margin-bottom:5px;}
  .field input{width:100%;background:var(--surface2);border:1px solid var(--line);border-radius:9px;padding:10px 12px;color:var(--text);font-family:var(--fb);font-size:14px;}
  .field input:focus{outline:none;border-color:var(--hero);}
  .help{font-size:11.5px;color:var(--faint);margin-top:8px;line-height:1.5;}
  .glo{padding:9px 0;border-bottom:1px solid var(--line);} .glo:last-of-type{border-bottom:0;}
  .glo b{display:block;font-size:12.5px;} .glo span{display:block;font-size:12px;color:var(--muted);margin-top:2px;}
  .btncopy{background:var(--surface2);border:1px solid var(--line);border-radius:8px;color:var(--muted);cursor:pointer;font-family:var(--fm);font-size:10px;font-weight:700;letter-spacing:0.08em;padding:6px 12px;text-transform:uppercase;}
  .btncopy:hover{border-color:var(--hero);color:var(--text);}
  .pcfg{background:var(--surface2);border:1px solid var(--line);border-radius:10px;padding:12px 14px;overflow-x:auto;font-family:var(--fm);font-size:11.5px;line-height:1.7;color:var(--muted);white-space:pre;margin:0;}
  code{font-family:var(--fm);font-size:0.88em;background:var(--surface2);border:1px solid var(--line);border-radius:4px;padding:1px 5px;}

  /* ---------- v0.7: insights, gate, death audit, loadout ---------- */
  /* auto-fit, not a pinned count: this tracked the number of tiles by hand and
     would wrap the moment a fifth was added. Widths chosen to keep today's
     layout exactly — 4 across on desktop, 2 on mobile. */
  .stats4{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px;}
  .stt{background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:10px 12px;}
  .stt .v{font-family:var(--fd);font-weight:800;font-size:26px;line-height:1;letter-spacing:-0.02em;color:var(--hero-ink);font-variant-numeric:tabular-nums;}
  .stt .k{font-family:var(--fm);font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:var(--faint);margin-top:6px;}
  .sparkrow{display:flex;align-items:center;gap:14px;padding:12px 0;border-bottom:1px solid var(--line);}
  .sparkrow:last-child{border-bottom:0;}
  .sparkrow .sl{flex:0 0 120px;}
  .sparkrow .sl b{display:block;font-size:12.5px;font-weight:600;}
  .sparkrow .sl span{font-family:var(--fm);font-size:9.5px;color:var(--faint);letter-spacing:0.08em;text-transform:uppercase;}
  .spark{flex:1;height:30px;min-width:0;}
  .bwrap{flex:1;min-width:0;max-width:460px;}
  .bcap{font-family:var(--fm);font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--faint);margin-bottom:7px;}
  /* cap the column width so a chart with two entries doesn't render two slabs */
  .binner{width:fit-content;max-width:100%;}
  .bchart{display:flex;align-items:flex-end;gap:6px;}
  .bcol{flex:1 1 32px;min-width:26px;max-width:54px;display:flex;flex-direction:column;align-items:stretch;gap:4px;}
  /* definite height: a percentage fill inside a flex-sized track resolves to auto */
  .btrack{height:34px;display:flex;align-items:flex-end;}
  .bfill{width:100%;background:var(--line2);border-radius:3px 3px 0 0;min-height:3px;}
  .bfill.now{background:var(--hero);}
  .bzero{width:100%;height:2px;background:var(--line);border-radius:2px;}
  .bval{font-family:var(--fm);font-size:10px;text-align:center;color:var(--muted);font-variant-numeric:tabular-nums;}
  .bval.off{color:var(--faint);opacity:.45;}
  .baxis{display:flex;justify-content:space-between;margin-top:5px;}
  .baxis span{font-family:var(--fm);font-size:8.5px;letter-spacing:0.08em;text-transform:uppercase;color:var(--faint);}
  .chempty{flex:1;font-family:var(--fm);font-size:10.5px;color:var(--faint);line-height:1.5;}
  @media (max-width:719px){.sparkrow{align-items:flex-start;flex-direction:column;gap:10px;} .sparkrow .sl{flex:none;} .bwrap{width:100%;max-width:none;}}
  .gate{border-left:3px solid var(--hero);}
  .gcheck{display:flex;align-items:center;gap:11px;width:100%;text-align:left;background:transparent;border:none;border-bottom:1px solid var(--line);padding:10px 0;cursor:pointer;color:var(--text);font-size:14px;}
  .gcheck .gbox{width:22px;height:22px;border-radius:7px;border:1.5px solid var(--line2);display:grid;place-items:center;flex:0 0 auto;}
  .gcheck.on .gbox{background:var(--hero);border-color:var(--hero);}
  .gcheck .gbox svg{width:12px;height:12px;color:var(--onhero);opacity:0;}
  .gcheck.on .gbox svg{opacity:1;}
  .gcheck.on{color:var(--muted);}
  .losswrap{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:14px;}
  .lossn{font-family:var(--fd);font-weight:800;font-size:26px;line-height:1;font-variant-numeric:tabular-nums;}
  /* tracks the CAUSES array length; auto-fit so adding a cause cannot wrap it */
  .causes{display:grid;grid-template-columns:repeat(auto-fit,minmax(88px,1fr));gap:6px;}
  .cbtn{background:var(--surface2);border:1px solid var(--line);border-radius:9px;padding:10px 4px;cursor:pointer;color:var(--muted);font-family:var(--fm);font-size:9px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;}
  .cbtn:hover{border-color:var(--hero-ink);color:var(--text);}
  .cbtn b{display:block;font-family:var(--fd);font-size:18px;color:var(--hero-ink);margin-bottom:3px;font-variant-numeric:tabular-nums;}
  .leakbar{display:flex;height:9px;border-radius:5px;background:var(--surface2);overflow:hidden;margin-top:12px;}
  .leakbar i{height:100%;display:block;}
  .lo-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  @media (max-width:520px){.lo-grid{grid-template-columns:1fr;}}
  .quickbtn{width:100%;background:transparent;color:var(--hero-ink);border:1px solid var(--hero-ink);border-radius:12px;padding:14px;font-family:var(--fm);font-weight:800;font-size:12px;letter-spacing:0.1em;cursor:pointer;margin-bottom:12px;}
  .quickbtn:hover{background:color-mix(in oklab,var(--hero) 12%,transparent);}

  /* ---------- v0.8: map prep ---------- */
  .mapchips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
  .mchip{background:var(--surface2);border:1px solid var(--line);border-radius:999px;color:var(--muted);cursor:pointer;
    font-family:var(--fm);font-size:10.5px;font-weight:700;letter-spacing:0.08em;padding:8px 14px;text-transform:uppercase;}
  .mchip:hover{border-color:var(--hero-ink);color:var(--text);}
  .mchip.on{background:var(--hero);border-color:var(--hero);color:var(--onhero);}
  .mchip .pin{opacity:.75;}
  .jobs{margin-top:2px;}
  .job{display:flex;gap:10px;padding:11px 0;border-bottom:1px solid var(--line);font-size:13px;color:var(--muted);}
  .job:last-child{border-bottom:0;}
  .job i{flex:0 0 auto;font-style:normal;color:var(--hero-ink);font-family:var(--fm);font-size:11px;font-weight:700;padding-top:1px;}
  .rt{display:flex;gap:10px;padding:11px 0;border-bottom:1px solid var(--line);align-items:baseline;}
  .rt:last-child{border-bottom:0;}
  .rt b{flex:0 0 92px;font-size:12.5px;font-weight:600;}
  .rt span{font-family:var(--fm);font-size:11px;color:var(--faint);}
  .lnrow{display:flex;gap:10px;align-items:flex-start;padding:11px 0;border-bottom:1px solid var(--line);}
  .lnrow:last-of-type{border-bottom:0;}
  .lnrow .lnb{flex:1;min-width:0;}
  .lnrow .lnb b{display:block;font-size:13px;font-weight:600;}
  .lnrow .lnb span{display:block;font-size:12px;color:var(--muted);margin-top:2px;white-space:pre-wrap;word-break:break-word;}
  .lndel{background:transparent;border:1px solid var(--line);border-radius:7px;color:var(--faint);cursor:pointer;width:28px;height:28px;flex:0 0 auto;font-size:12px;}
  .lndel:hover{border-color:var(--bad);color:var(--bad);}
  .pmodel{font-family:var(--fm);font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--hero-ink);border:1px dashed var(--hero-ink);border-radius:8px;padding:8px 11px;margin-top:12px;display:inline-block;}
  .pcue{font-family:var(--fm);font-size:11px;color:var(--hero-ink);margin-top:4px;}
  .lnadd{display:grid;grid-template-columns:1fr 1fr auto;gap:8px;align-items:end;margin-top:12px;}
  @media (max-width:600px){.lnadd{grid-template-columns:1fr;}}

  #session{position:fixed;inset:0;z-index:70;display:none;flex-direction:column;background:var(--bg);padding:20px 18px calc(20px + env(safe-area-inset-bottom));}
  #session.show{display:flex;}
  #session .sbar{display:flex;justify-content:space-between;align-items:center;}
  #session .siconx{background:transparent;border:1px solid var(--line);border-radius:9px;width:34px;height:34px;color:var(--muted);cursor:pointer;font-size:14px;}
  #session .sdots{display:flex;gap:6px;margin:16px 0;}
  #session .sdot{flex:1;height:4px;border-radius:2px;background:var(--surface2);}
  #session .sdot.past{background:var(--hero);opacity:.5;} #session .sdot.cur{background:var(--hero);}
  /* scrolls rather than clips if a wordy drill meets a short screen */
  #session .sctr{flex:1;min-height:0;overflow-y:auto;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:7px;}
  #session .sname{font-size:26px;max-width:16ch;line-height:1.05;}
  #session .scue{font-family:var(--fd);font-weight:800;text-transform:uppercase;letter-spacing:-0.01em;font-size:clamp(15px,3.4vw,19px);color:var(--hero-ink);max-width:22ch;margin:10px 0 2px;}
  #session .srule{font-family:var(--fm);font-size:12px;color:var(--bad);max-width:36ch;margin-top:6px;line-height:1.5;}
  /* full-strength text, not --muted: this is read mid-drill at a glance, so it
     is content rather than caption and the grey was the main legibility fault */
  #session .ssub{color:var(--text);font-size:15px;max-width:34ch;line-height:1.45;}
  /* One labelled fact per row, left-aligned so the labels form a column the eye
     runs down. Centred prose forced you to re-read to find anything. */
  #session .sfacts{display:grid;gap:9px;text-align:left;margin:16px 0 4px;max-width:38ch;}
  #session .sfact{display:grid;grid-template-columns:66px 1fr;gap:11px;align-items:baseline;}
  #session .sk{font-family:var(--fm);font-size:10px;letter-spacing:0.12em;color:var(--faint);}
  #session .sv{color:var(--text);font-size:15px;line-height:1.4;}
  #session .sv.tip{color:var(--hero-ink);font-weight:700;}
  #session .sv.good{color:var(--good);}
  #session .sv.warn{color:var(--bad);}
  #session .smeas{font-family:var(--fm);font-size:12px;color:var(--muted);margin-bottom:4px;}
  #session .stime{font-family:var(--fd);font-weight:800;font-size:clamp(64px,20vw,92px);letter-spacing:-0.03em;color:var(--hero);font-variant-numeric:tabular-nums;line-height:1;margin:4px 0;}
  #session .stime.zero{color:var(--good);}
  #session .sctrls{display:flex;gap:10px;margin-top:8px;flex-wrap:wrap;justify-content:center;}
  /* Every size above is phone-tuned and never grew, so on a maximised desktop
     window the drill sat as a ~200px ribbon of small text in a field of black.
     Scale up past the phone breakpoint and let the lines actually run. */
  @media (min-width:720px){
    #session{padding:28px 32px;}
    #session .sctr{gap:11px;}
    #session .sname{font-size:clamp(34px,3.2vw,50px);max-width:24ch;}
    #session .ssub{font-size:clamp(17px,1.3vw,21px);max-width:54ch;}
    #session .scue{font-size:clamp(21px,1.9vw,29px);max-width:36ch;margin:14px 0 2px;}
    #session .smeas{font-size:13px;}
    #session .srule{font-size:15px;max-width:62ch;}
    #session .sfacts{gap:13px;max-width:62ch;margin:24px 0 8px;}
    #session .sfact{grid-template-columns:86px 1fr;gap:18px;}
    #session .sk{font-size:12px;}
    #session .sv{font-size:clamp(17px,1.3vw,21px);}
  }

  /* ---------- celebrate overlay ---------- */
  #cele{position:fixed;inset:0;z-index:80;display:none;place-items:center;background:color-mix(in oklab,var(--bg) 88%, transparent);overflow:hidden;}
  #cele.show{display:grid;}
  #cele .scan{position:absolute;left:0;right:0;height:2px;background:var(--hero);opacity:.6;animation:lk-scan 1.1s ease-in-out both;}
  #cele .inner{text-align:center;}
  #cele .ct1{font-family:var(--fd);font-weight:800;font-size:28px;text-transform:uppercase;letter-spacing:-0.02em;margin-top:18px;animation:lk-rise .5s .2s ease both;}
  #cele .ct2{font-family:var(--fm);font-size:12px;letter-spacing:0.18em;color:var(--hero);margin-top:8px;animation:lk-rise .5s .32s ease both;}

  @keyframes lk-snap{from{transform:scale(1.55);opacity:0}to{transform:scale(1);opacity:1}}
  @keyframes lk-ping{from{transform:scale(.7);opacity:.8}to{transform:scale(2.1);opacity:0}}
  @keyframes lk-scan{from{top:0}to{top:100%}}
  @keyframes lk-rise{from{transform:translateY(10px);opacity:0}to{transform:none;opacity:1}}
  @keyframes lk-blink{50%{opacity:.25}}
  @keyframes spin{to{transform:rotate(360deg)}}
  @media (prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important;}}
</style>

<script>
(function(){
  "use strict";
  var KEY="lockin.v1";
  var VERSION="0.15.2";
  var storageOk=true, mem=null;

  /* ---------- svg bits ---------- */
  var RET='<svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square" aria-hidden="true"><path d="M3 9V3h6M23 3h6v6M3 23v6h6M29 23v6h-6"/><path d="M16 8.5v3.5M16 20v3.5M8.5 16h3.5M20 16h3.5"/><circle cx="16" cy="16" r="1.9" fill="currentColor" stroke="none"/></svg>';
  var CHK='<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="square" aria-hidden="true"><path d="M3 8.5l3.5 3.5L13 4.5"/></svg>';
  var GEAR='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="3.2"/><path d="M12 2.8v3M12 18.2v3M2.8 12h3M18.2 12h3M5.5 5.5l2.1 2.1M16.4 16.4l2.1 2.1M18.5 5.5l-2.1 2.1M7.6 16.4l-2.1 2.1"/></svg>';
  var LIST='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square" aria-hidden="true"><path d="M8 6h13M8 12h13M8 18h13M3 6h.5M3 12h.5M3 18h.5"/></svg>';
  var DL='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square" aria-hidden="true"><path d="M12 3v11M7 10l5 5 5-5M4 20h16"/></svg>';
  var UL='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square" aria-hidden="true"><path d="M12 14V3M7 8l5-5 5 5M4 20h16"/></svg>';
  var CAL='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square" aria-hidden="true"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 10h18M8 3v4M16 3v4"/></svg>';

  /* ---------- coaching catalog (research-corrected Jul 2026) ---------- */
  // where = the map or server you load; sub = how to approach it once there;
  // cue = the compressed live reminder (TIP on the drill screen); why = the fuller
  // read-ahead explanation shown in the Plan library. why is APPENDED last so the
  // existing arg positions never shift (inserting a param mid-signature broke the
  // protocol once already).
  // Fields, in the order the drill screen reads them: where=MAP, sub=DO,
  // goal=GOAL (what you're building), cue=MINDSET, m=RIGHT (a good rep),
  // rule=WRONG (a bad rep). why=the fuller read-ahead shown in the Plan library.
  // goal is APPENDED last so no existing arg position shifts.
  function D(t,where,sub,m,dur,core,cue,rule,why,goal){return {t:t,where:where||"",sub:sub,m:m,dur:dur,core:!!core,cue:cue||"",rule:rule||"",why:why||"",goal:goal||""};}
  var FOCI={
    cstrafe:{name:"Counter-strafing",why:"Your rifle regains accuracy the instant you slow below ~34% of top speed — a counter-strafe gets you there instantly (not a dead stop, just a slow walk). Highest-leverage fix up to the mid ranks; it matters less at the very top.",drills:[
      D("Peek-stop-tap","aim_botz, with cl_showpos 1","Peek out, counter-strafe, fire the instant you stop","The counter-strafe bites and the shot breaks in the same beat — first bullet on the head.",8,true,"Stop, then shoot. Never both.","You fire while still sliding — or you wait for a dead stop you don't need. Both give the peek away.","Your rifle only regains accuracy once you drop below ~34% of run speed. A counter-strafe — tapping the opposite key — gets you there instantly, so you can peek and fire in one motion instead of waiting for a dead stop.","Fire the moment the counter-strafe bites — accuracy is back below ~34% speed, long before a dead stop."),
      D("Stop-then-shoot","aim_botz — the peek/spray walls","A-stop-fire, then D-stop-fire — both directions","The stop and the shot are one beat; the first bullet lands.",7,true,"The stop IS the shot.","A gap between stopping and firing, or a shot mid-slide. Reset the rep.","Grooves the timing until the counter-strafe and the click are one action. The instant the counter-strafe bites is the instant to fire; wait for a dead stop and you've given the peek away.","Weld the counter-strafe and the click into a single motion."),
      D("Duels under fire","Aim Arena, or TRAINING.01 — combat mode","Dynamic bots that move and rush you, not static targets","You plant and fire cleanly even as they close on you.",5,false,"Strafe, plant, then fire.","You panic-spray on the move the moment one rushes you.","Doing this in an empty range is easy — doing it against something that moves is the real skill. Bots that rush you force you to counter-strafe under pressure instead of panic-spraying on the move.","Hold the stop-then-shoot discipline while they come at you.")]},
    consistency:{name:"Aim consistency",why:"Your aim's already there on good nights. The job is a routine that makes it show up every night — not new skill.",drills:[
      D("Fixed warm-up","CST Labs, or Aim Arena","The same modes in the same order, every session","Same modes, same order, done before anything else.",10,true,"Same order, every time.","Skipping to the fun drill, or a different routine each day.","A fixed routine starts every session from the same baseline, so your worst days climb toward your best. Consistency is the whole goal, and a repeatable warm-up is how you buy it.","Start every session from the same known baseline."),
      D("100 micro-adjust one-taps","aim_botz, or CS2Labs","Heads only on aim_botz — body hits don't count — or the MicroAdjust mode on CS2Labs","Each shot fires only after the crosshair has settled — slow and clean.",6,true,"Settle. Confirm. Click.","Clicking before it settles. A rushed rep is wasted; redo it.","Most missed one-taps come from clicking before the crosshair has settled. Slow, clean reps build the habit of confirming the shot first — speed follows accuracy, never the other way round.","Make the settled, confirmed one-tap your default shot."),
      D("Reaction baseline","TRAINING.01 — reaction mode","Same settings every session — write your number down","You log today's number and compare it to your usual one.",4,false,"React. Do not predict.","Guessing at the target instead of reacting, or not logging a bad number.","A reaction number you track over time tells you whether you're actually warm or just guessing. Slower than your usual means keep warming up, not queue.","Get an honest read on whether you're actually warm.")]},
    placement:{name:"Crosshair placement",why:"Keep the dot at head height and pre-aimed, so you win the first shot before it's a fight.",drills:[
      D("Prefire lines","Yprac Hub — prefire mode, or a timed prefire course","Run your map's route against the clock","Crosshair rides head height the whole route; your time drops week to week.",8,true,"Head height, the whole way.","Crosshair drifts below head height. Restart the route.","Good players die less because their crosshair is already on the head when an angle opens. Running a fixed route against the clock trains head-height placement and makes clean-and-fast measurable.","Arrive on every angle already aimed at head height."),
      D("Head-height resets","aim_botz","Re-place to head level between every tap","After every tap your crosshair returns to head height on its own.",6,true,"Reset before you look.","Crosshair drops toward the floor between kills.","Between kills your crosshair drifts toward the floor, so the next duel starts with a flick you shouldn't need. Re-placing to head level after every tap makes the right position automatic.","Make re-placing to head level automatic between shots."),
      D("Randomised prefire","Aim Arena — prefire mode","Random angles, so no line can be memorised","You're pre-aimed before the angle opens, no flick needed.",5,false,"Pre-aim it, do not react to it.","You had to flick to the target — the placement failed.","Memorising one prefire line is a trick; placing your crosshair right on angles you can't predict is the skill. Random spawns force real placement instead of a rehearsed route.","Place correctly on angles you can't predict or memorise.")]},
    spray:{name:"Spray / recoil",why:"Learn the pattern so your held sprays land instead of leaking off target.",drills:[
      D("AK / M4 patterns","Recoil Master","Guided pattern reps, one weapon at a time","Grouping tightens set to set as you pull the shape smoothly.",8,true,"Pull the shape, do not fight it.","Fighting the recoil or yanking to centre. Reset fully between sprays.","Every rifle's recoil follows a fixed shape. Once you know it you pull against it smoothly instead of yanking back to centre — guided reps burn the shape into muscle memory.","Learn each rifle's recoil shape so you can pull against it."),
      D("Spray transfers","aim_botz, or TRAINING.01 — spray mode","Burst and spray with hits-to-kill raised","You drag the recoil onto the second body without lifting off.",6,true,"Drag through. Do not re-aim.","Releasing to re-aim — that resets the pattern and ends the rep.","Two enemies close together should fall in one spray. Dragging the recoil from the first onto the second keeps the bullets landing; lifting off to re-aim resets the pattern and wastes it.","Kill a second target inside the same spray."),
      D("Range bursts","Target Training — shrink the targets, step back","Push the distance out, shrink the target","Each burst lands inside the ring; you reset between them.",5,false,"Four rounds, then breathe.","A burst longer than about six rounds. It doesn't count.","At distance a full spray throws bullets everywhere. Short bursts stay accurate and let the pattern reset between them — the further the target, the shorter the burst.","Stay accurate at distance with short, controlled bursts.")]},
    utility:{name:"Utility",why:"Good util wins duels before they're duels — fewer coinflips, more rounds on your terms.",drills:[
      D("5 core smokes","Your best map — own server, or Yprac Hub utility mode","The five smokes that decide rounds, until automatic","All five land correctly with no mid-round lineup check.",8,true,"Line it up, then throw.","Checking the lineup while you throw. Redo it.","The handful of smokes that decide rounds on your map should be automatic, with no checking a lineup mid-round. Drill the same five until you can throw them under pressure.","Throw your map's round-deciding smokes without thinking."),
      D("2 entry pop-flashes","Your best map — own server","Only the flashes that support your own entries","Your peek lands while the flash is still active.",6,true,"Flash for the peek, not the kill.","You peeked after it popped, or flashed yourself. Redo.","A pop-flash only helps if you're peeking as it pops. Practise the flashes that support your own entry so the enemy is blind exactly when you swing, not a second too early.","Blind the enemy exactly as you swing, not a beat before."),
      D("Molotov denials","Your best map — own server","The standard clears, thrown from cover","The bounce and spread land on the spot; you're never exposed throwing it.",5,false,"Deny the spot, not the player.","Stepping into the open to throw, or missing the spot.","A molotov's job is to make a spot unholdable and buy time or space, not to farm a kill. Learn the standard clears so you can deny a plant or a hold from behind cover.","Make a spot unholdable while staying safe behind cover.")]},
    positioning:{name:"Positioning & game sense",why:"Being in the right place beats out-aiming from the wrong one. Cheaper wins, less variance.",drills:[
      D("Death audit","Your own demos","One death per round — name what actually killed you","For each death you name the real cause and tally it honestly.",10,true,"Was this fight mine to take?","Blaming your aim for a fight you should never have taken.","Most deaths are avoidable fights, not aim losses. Reviewing one death per round and naming the real cause turns “I keep dying” into a specific, fixable pattern.","Turn “I keep dying” into a named, fixable pattern."),
      D("Pro POV study","A pro demo on your map","Follow one player in your role, start to finish","You note three spots or timings from your role that you never play.",8,true,"Watch the position, not the aim.","Watching their crosshair instead of where they stand and when.","Watching a pro in your role shows you where to be, not just how they click. Note the positions and timings you never use — that gap is the difference between your game and theirs.","Steal positions and timings you don't currently use."),
      D("Off-angle setups","Your main map — own server","Build crossfires instead of head-on holds","You set a crossfire or off-angle; first contact is on your terms.",5,false,"First contact on your terms.","Holding the obvious head-on angle everyone already pre-aims.","Holding the angle everyone expects means you trade fairly at best. An off-angle or crossfire means you see them first and the duel is yours before it starts.","See the enemy first by holding where they don't expect.")]},
    clutch:{name:"Clutch craft",why:"Clutches are won on info, isolation and time — all trainable, not luck.",drills:[
      D("Retake 1vX reps","Retake servers, or TRAINING.01 — combat mode","Several opponents at once, so the fights stack up","You use angles and time so you only ever fight one at once.",10,true,"One fight at a time.","Taking two at the same time, or double-peeking the same angle.","A clutch is won by isolating each enemy into a 1v1, never by taking them all at once. Retake reps against multiple bots train you to use angles and time so you only ever fight one at a time.","Break a multi-kill situation into separate 1v1s."),
      D("Clock craft","Your own server, or a retake server","Fake defuses and sound baits against the timer","You fake a defuse or bait a step to force them to commit first.",6,true,"The timer is a weapon.","Rushing the fight when time was already on your side.","In a clutch the clock is on your side as often as your aim. Faking a defuse, baiting a step, or forcing the enemy to come to you wins rounds your crosshair alone wouldn't.","Win with the clock, not just the crosshair."),
      D("Sound-only reads","Your own demos, or a live match","Name the position from audio before you peek","You call the position from audio, then confirm it on the peek.",5,false,"Call it before you look.","Peeking blind before you've placed them by sound. Redo.","Good clutchers know where the enemy is before they peek. Practise naming positions from footsteps and shots alone so you enter every duel already knowing where to aim.","Know where they are before you ever peek.")]},
    entry:{name:"Opening duels",why:"Win the opening pick on your terms, not on a 50/50 wide-swing.",drills:[
      D("Opening-angle prefires","Aim Arena — prefire mode, or a timed prefire course","Only the angles you meet on first contact","You're already aimed at the first-contact angle as you enter.",8,true,"Already aimed when you arrive.","Arriving with your crosshair off the common angle.","As an entry you meet the same first-contact angles every round. Prefiring only those means your first bullet is on the head the instant you arrive, before they've reacted.","Put the first bullet on the head the instant you arrive."),
      D("Info jiggles","Your main map — own server","Shoulder-peek to bait, then commit","You bait the shot and get the position without committing.",5,true,"Info first. Duel second.","Committing to the duel before you actually have the info.","A shoulder-peek that draws a shot without committing tells your team exactly where the enemy is — worth more than a coin-flip duel. Bait the shot, then choose whether to commit.","Trade a shoulder-peek for information, not a coin-flip duel."),
      D("Trade timing","With a duo, or TRAINING.01 — rush mode","Enter together and refrag immediately","You enter with a teammate and refrag inside a couple of seconds.",6,false,"Die traded, never alone.","Entering alone, or trading too slowly to matter.","An entry's death only pays off if a teammate refrags immediately. Practise entering together and trading inside a second or two, so even your deaths win the round.","Make your death win the round by being traded instantly.")]},
    awp:{name:"AWP",why:"The AWP needs a near-full stop to be pinpoint — stricter than rifles — so counter-strafe into the shot; add repeek so a miss isn't a death.",drills:[
      D("One-taps → flicks","aim_botz, then Target Training","Statics first, then moving dots at 0.5 scale","The crosshair arrives, stops on the dot, and the shot confirms before you click. Hit rate over speed.",8,true,"Aim where it is going.","Flicking past and dragging back, or spraying hope at movers.","The AWP kills in one shot, so placement and timing beat raw speed. Statics build the one-tap; moving dots train you to lead the target and shoot where it's going, not where it is.","Trade speed for certainty — one shot has to land."),
      D("Stop-into-shot","aim_botz, or your main map","Counter-strafe straight into the scoped shot","You counter-strafe to a near-full stop before the click.",6,true,"Full stop, then click.","Clicking while you're still moving. The shot doesn't count.","The AWP is inaccurate unless you're almost fully stopped — stricter than a rifle. Counter-strafing straight into the scoped shot lets you take the angle and still land the near-stationary bullet it needs.","Take the angle and still land the near-stationary AWP shot."),
      D("Repeek discipline","Your main map — own server","Shot, then reposition before the next angle","After each shot you reposition and peek a fresh angle.",5,false,"Never the same pixel twice.","Re-peeking the same pixel the enemy is now aimed at.","After an AWP shot the enemy knows exactly where you were. Repositioning before the next peek means you show up somewhere new each time instead of dying to a prefire on your old spot.","Never die to a prefire on the spot you just shot from.")]},
    rifle:{name:"Rifling",why:"A reliable rifle so you stop bleeding the rounds you can't play for picks.",drills:[
      D("Pattern reps","Recoil Master","AK first, then M4 — full patterns","Grouping tightens set to set as you pull the shape.",8,true,"Pull the shape, do not fight it.","Fighting the recoil instead of pulling with it.","The AK and M4 each have a fixed recoil shape. Learning to pull against it smoothly — AK first, it's the harder one — turns spraying from a gamble into a controllable tool.","Turn spraying from a gamble into a controllable tool."),
      D("Transfers","aim_botz","Multi-bot spray transfers, no re-aiming","You drag the recoil onto the second man without re-aiming.",6,true,"Drag through the second man.","Lifting off to re-aim, which resets the pattern.","Two enemies caught in the open should both fall in one spray. Dragging the recoil onto the second target without re-aiming keeps the pattern intact and the bullets landing.","Drop a second target inside the same spray."),
      D("Prefire angles","Yprac Hub — prefire mode, or a timed prefire course","Your main map, the full route every run","Crosshair rides head height the whole route; your time keeps improving.",5,false,"Head height, the whole way.","Crosshair drifting off head height between angles.","On your main map you meet the same angles every round. Running the route with your crosshair at head height the whole way means you're pre-aimed on every common spot before it opens.","Be pre-aimed on every common spot before it opens.")]},
    movement:{name:"Movement",why:"Clean air-strafes and efficient jump pathing get you between fights faster and make you harder to hit inside them — and a peek you do not have to think about is a peek you win.",drills:[
      D("Air-strafe laps","Movement Mirage","Jump the objects, hold the strafe through corners","You hold the strafe through every corner with no speed lost.",8,true,"Hold the curve. Do not tap it.","Tapping the keys, or bleeding speed on the turns.","Air-strafing keeps or builds speed by holding a smooth curve, not tapping the keys. Jumping the objects on a movement map and holding the strafe through every corner trains the fluid input it needs.","Keep or build speed by holding a smooth curve."),
      D("Jump pathing","Movement Hub","Time trial — follow the guide line, then beat it","Same line every run, a little faster each session.",7,true,"Same line, faster.","A new line each attempt, so nothing consolidates.","Consistent movement comes from repeating one route until it's automatic, then shaving time off it. A time trial gives you a number to beat, so improvement is measurable rather than a feeling.","Make one route automatic, then beat your own time."),
      D("Crouch-jump timings","CST Labs — KZ-style jump training","Repeat one jump until it lands every time","You crouch at the top of the arc and land it five in a row.",5,false,"Crouch late, not early.","Crouching too early. Move on only once it's consistent.","A crouch-jump clears gaps a normal jump can't — but only if you crouch at the top of the arc, not the bottom. Repeat one jump until it lands every time before moving on.","Land the gaps a normal jump can't clear.")]},
    match:{name:"Match night",why:"",drills:[
      D("Full warm-up first","","the fixed routine before you queue","no cold queues",10,true),
      D("One process goal","","e.g. stop before every shot","graded on the goal, not the scoreboard",1,true),
      D("The gate","","only queue warm + not tilted","honest check before you hit play",1,true),
      D("Stop-loss armed","","2 tilted losses = done for tonight","protect the rating",1,false)]},
    rest:{name:"Rest",why:"",drills:[
      D("Rest day","","recovery is part of consistency — nothing required","come back tomorrow",0,false)]}
  };
  var KEYSTONE_ORDER=["cstrafe","consistency","placement","spray","utility","positioning","movement","clutch","entry"];

  // Every session closes on slow, perfect reps. You consolidate whatever you did LAST, so ending
  // on the hardest block bakes in the sloppiest mechanics. (Coach's idea — it's the right one.)
  var CALM=D("Calm reset","","Slow the pace right down — perfect reps only, end on clean taps","Slow taps that land, ending on three perfect in a row.",2,false,"I have time.","Rushing or forcing it. A hurried rep doesn't count — reset and continue.","Every session ends on slow, perfect reps because you consolidate whatever you did last. Ending calm and clean bakes in good mechanics, not the sloppy ones from the hardest block.","Bank clean mechanics — you keep whatever you rep last, so finish on your best.");

  /* ---------- coach-built protocols ---------- */
  var PROTOCOLS=[{
    id:"oblivion", name:"The Oblivion Protocol", by:"oblivion", mins:"30–35",
    blurb:"A full mechanical-to-decision session: aim foundations on aim_treeni_fps, then angle discipline on aim_rush. Written for a coached player and kept exactly as it was.",
    model:"Angle first → body second → shot last",
    after:"Finish with a Premier match treated purely as application — apply the angle discipline and first-bullet confirmation under live pressure, and do not care about the result.",
    blocks:[
      D("Warm-up · linear control","aim_treeni_fps","Linear Area, 3 targets, size 13, ~200 reps","One clean motion per target — smooth, not fast.",3,true,"Smooth, not fast.","Sawing back and forth across the target.","Opens the session by grooving smooth horizontal tracking. One clean motion per target, no sawing back and forth — this sets the tone for everything after it.","Groove smooth horizontal tracking to open the session."),
      D("Micro-adjustments","aim_treeni_fps","Linear Area, 10 targets, size 7, distance 5, ~100–150 reps","Minimal mouse travel on each correction.",3,true,"Small corrections only.","The mouse travelled far — the placement was already wrong.","Trains the tiny crosshair corrections that decide most duels. If the mouse travelled far, the placement was already wrong — keep the movements minimal.","Sharpen the tiny corrections that win most duels."),

  /* ---------- date/streak core (unchanged, tested) ---------- */
  function two(n){return (n<10?"0":"")+n;}
  function dateKey(d){return d.getFullYear()+"-"+two(d.getMonth()+1)+"-"+two(d.getDate());}
  function parseKey(k){return new Date(k+"T00:00:00");}
  function addDays(d,n){var x=new Date(d);x.setDate(x.getDate()+n);return x;}
  function midnight(d){var x=new Date(d);x.setHours(0,0,0,0);return x;}
  function mondayOf(d){var x=midnight(d);return addDays(x,-((x.getDay()+6)%7));}
  function isFreebie(d){return d.getDay()<1||d.getDay()>4;}
  // a day counts as "training" per the plan (not a rest/match day); falls back to Mon–Thu with no plan.
  // Streak/miss logic keys off THIS, not a hard-coded weekday, so a low-days plan's prescribed rest
  // days neither break the streak nor paint as "missed".
  function isTrainingDay(plan,d){var wk=plan&&plan.weekly,f=wk?wk[d.getDay()]:null;if(f)return f!=="rest"&&f!=="match";return !isFreebie(d);}
  function computeStreak(st,today){var s=0,d=new Date(today),t=st.sessions[dateKey(d)];if(!t||!t.warm)d=addDays(d,-1);
    while(true){var x=st.sessions[dateKey(d)];if(x&&x.warm){s++;d=addDays(d,-1);}else if(!isTrainingDay(st.plan,d)){d=addDays(d,-1);}else break;}return s;}
  // how many training days the plan defines (a user can put them anywhere in the week)
  function trainingDayCount(plan){var wk=plan&&plan.weekly;if(!wk)return 4;var n=0;for(var d=0;d<7;d++){var f=wk[d];if(f&&f!=="rest"&&f!=="match")n++;}return n;}
  function weekdayCount(st,mon){var c=0;for(var i=0;i<7;i++){var day=addDays(mon,i);if(!isTrainingDay(st.plan,day))continue;var x=st.sessions[dateKey(day)];if(x&&x.warm)c++;}return c;}
  /* ---------- week-4 / week-8 plan review ----------
     A coach looks at a block of training and adjusts. This reads only what's
     already on the device — ticked drills, logged deaths, Leetify checkpoints —
     and proposes ONE change with the evidence for it. It never invents movement:
     a metric is only reported when both the base and the checkpoint exist, and
     with too little logged it explicitly declines to suggest anything. */
  var LEAK_FOCUS={pos:"positioning",info:"positioning",util:"utility",trade:"entry",aim:"placement"};
  function planReview(st,now){

    now=now||new Date();

    if(wk>=9&&!done["8"])n=8;else if(wk>=5&&!done["4"])n=4;
    if(!n)return null;
    var c=parseKey(plan.created),from=addDays(c,n===4?0:28),to=addDays(c,n===4?28:56);

      if(isTrainingDay(plan,d))planned++;

    }
    // metric movement — only where the user actually entered both numbers
    var moved=[],cur=(n===4)?"w4":"w8";
    (plan.targets||[]).forEach(function(t){
      var m=(st.metrics||{})[tkey(t.n)];if(!m)return;
      var base=m.base,val=m[cur];
      if(base==null||val==null)return;
      var lower=/\(°\)|deaths/i.test(t.n),delta=Math.round((val-base)*100)/100;
      moved.push({n:t.n,base:base,val:val,delta:delta,

    for(var k in leaks){sum+=leaks[k];if(top===null||leaks[k]>leaks[top])top=k;}
    var feel=feelSeries(st,28),favg=feel.length?Math.round((feel.reduce(function(a,b){return a+b;},0)/feel.length)*10)/10:null;
    var rv={n:n,weeks:(n===4?"1–4":"5–8"),next:(n===4?"5–8":"9–12"),
      trained:trained,planned:planned,moved:moved,leaks:leaks,leakTop:top,leakSum:sum,
      feel:favg,thin:(trained<5),suggest:null};
    if(rv.thin)return rv;                                  // too little logged to conclude anything
    // 1) a dominant logged leak that isn't what you're already training
    if(sum>=8&&top&&leaks[top]/sum>=0.35){
      var f=LEAK_FOCUS[top];
      if(f==="placement"&&plan.keystone==="placement")f="spray";
      if(f&&FOCI[f]&&f!==plan.keystone){

    }

    if(plan.keystone==="cstrafe"){
      for(var i=0;i<moved.length;i++){
        if(/Counter-strafing/i.test(moved[i].n)&&moved[i].val>=78){
          rv.suggest={key:"placement",name:FOCI.placement.name,

  // Applies the recommendation WITHOUT resetting the programme: the created date,
  // history and the user's own match-night placement all survive.
  function applyReview(st,key){
    var old=st.plan,p2=generatePlan(old.profile||{},key);
    var seq=[],d;
    for(d=0;d<7;d++){var f=p2.weekly[d];if(f!=="match"&&f!=="rest")seq.push(f);}
    var w={},i=0;

  /* ---------- coming back after a gap ----------
     The point where habit apps lose people: you return to a zeroed streak, a
     calendar of misses and a banner telling you off. This detects a real lapse
     and replaces the telling-off with the smallest possible way back in.
     Counted in MISSED TRAINING DAYS, not calendar days — five days away is
     normal on a two-day-a-week plan and a genuine lapse on a four-day one. */
  var LAPSE_MIN=3;
  function lapseInfo(st,now){
    var plan=st&&st.plan;if(!plan)return null;

    var last=parseKey(warm[warm.length-1]);
    var gap=Math.round((midnight(now)-midnight(last))/86400000);
    if(gap<2)return null;
    var missed=0;
    for(var d=addDays(last,1);midnight(d)<midnight(now);d=addDays(d,1))
      if(isTrainingDay(plan,d))missed++;

  /* ---------- storage ---------- */
  function blank(){return {plan:null,sessions:{},settings:{},metrics:{},reviews:{},lineups:{},planReviews:{}};}
  function load(){try{var s=localStorage.getItem(KEY);storageOk=true;if(!s)return blank();var o=JSON.parse(s);o.sessions=o.sessions||{};o.settings=o.settings||{};o.metrics=o.metrics||{};o.reviews=o.reviews||{};o.lineups=o.lineups||{};o.planReviews=o.planReviews||{};migrate(o);return o;}catch(e){storageOk=false;return mem||blank();}}

    if(o._m>=2)return; // one-time: load() runs on a 30s timer, so migration must not mutate on every read
    for(var k in o.sessions){var f=o.sessions[k]&&o.sessions[k].feel;if(f&&f>5)o.sessions[k].feel=Math.min(5,Math.ceil(f/2));}
    if(o.settings.theme==="auto")delete o.settings.theme;
    // old plans stored diagnosis with literal <b> tags; convert to safe markers (only exact <b>/</b>,
    // so a hostile <img …> stays escaped by richText). Idempotent.
    if(o.plan&&typeof o.plan.diagnosis==="string")o.plan.diagnosis=o.plan.diagnosis.split("<b>").join("[[b]]").split("</b>").join("[[/b]]");
    // metrics were keyed by array position (m0/m1/…); re-key to stable name-derived keys so a retake
    // into a different target set can't display old numbers under the wrong metric.
    if(o.plan&&o.plan.targets&&o.metrics){for(var i=0;i<o.plan.targets.length;i++){var ok="m"+i;if(o.metrics[ok]!=null){var nk=tkey(o.plan.targets[i].n);if(o.metrics[nk]==null)o.metrics[nk]=o.metrics[ok];delete o.metrics[ok];}}}

  /* ---------- TODAY ---------- */
  // "Never miss twice" must not scold someone for a day before their plan existed — a
  // brand-new user has no history to have missed. Same plan.created floor the calendar uses.
  function missedYesterday(st,now){
    var plan=st&&st.plan;if(!plan)return false;
    var yday=addDays(now,-1);
    if(!isTrainingDay(plan,yday))return false;
    var createdMid=plan.created?parseKey(plan.created).getTime():0;
    if(midnight(yday).getTime()<createdMid)return false;      // before this plan existed
    // "never miss twice" protects a habit you've started. Nagging someone who has never
    // trained isn't a reminder, it's just discouraging — they get the cue prompt instead.
    var sess=st.sessions||{},started=false;
    for(var k in sess){if(sess[k]&&sess[k].warm){started=true;break;}}
    if(!started)return false;
    var s=sess[dateKey(yday)];
    return !(s&&s.warm);
  }
  function weekCells(st,now){
    var mon=mondayOf(now),tk=dateKey(now),sh=["M","T","W","T","F","S","S"],full=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"],todayMid=midnight(now).getTime(),h="";
    var createdMid=(st.plan&&st.plan.created)?parseKey(st.plan.created).getTime():0; // don't mark days before the plan existed as missed
    for(var k=0;k<7;k++){var day=addDays(mon,k),dk=dateKey(day),s=st.sessions[dk];
      var isT=dk===tk,dm=midnight(day).getTime(),fut=dm>todayMid,req=isTrainingDay(st.plan,day),before=dm<createdMid;
      var cls,mark,lab;
      if(s&&s.warm){cls="done";mark="✓";lab="trained";}
      else if(isT){cls="today";mark="●";lab="today";}
      else if(fut){cls="up";mark="";lab="upcoming";}
      else if(req&&!before){cls="miss";mark="✕";lab="missed";}
      else{cls="rest";mark="—";lab="rest";}
      h+='<div class="wd"><div class="dl">'+sh[k]+'</div><div class="wc '+cls+'" role="img" aria-label="'+full[k]+' '+day.getDate()+' — '+lab+'">'+mark+'</div></div>';
    }
    return h;
  }
  // which drills to show for a focus, given the plan's time budget — core-only for the 10-min tier.
  // Preserves each drill's ORIGINAL index (completion is stored by index) so nothing shifts.
  function drillList(F,plan){
    var lite=plan&&plan.profile&&plan.profile.time==="10";
    var out=[];F.drills.forEach(function(d,ix){if(!lite||d.core)out.push({d:d,i:ix});});
    return out;
  }
  function htmlToday(st){
    var plan=st.plan,now=new Date(),tk=dateKey(now),dow=now.getDay();
    var act=backfill?addDays(now,-1):now,actK=dateKey(act),actDow=act.getDay();

    var streak=computeStreak(st,now),mon=mondayOf(now),wd=weekdayCount(st,mon),target=trainingDayCount(plan);
    var dstr=now.toLocaleDateString(undefined,{weekday:"long",day:"numeric",month:"short"});
    // backfill toggle (only if yesterday was a trainable day)
    var ydTrainable=plan.weekly[addDays(now,-1).getDay()]!=="rest";
    var bfToggle=backfill?'<button class="bftoggle on" data-backfill="1">◂ BACK TO TODAY</button>':(ydTrainable?'<button class="bftoggle" data-backfill="1">LOG YESTERDAY</button>':'');
    var hd='<div class="hd"><div><div class="ml">'+dstr.toUpperCase()+' · WK '+programWeek(plan,now)+'/12</div><h1 class="dsp">TODAY</h1></div>'+

      '<div class="hr-r"><div class="ml">THIS WEEK</div><div class="n2 dsp">'+wd+'<span style="color:var(--faint);">/'+target+'</span></div>'+
      '<div class="ml '+(wd>=target?"status-good":"status-mut")+'">'+(wd>=target?"TARGET HIT":"ON PACE")+'</div></div></div>'+
      '<div class="wk7">'+weekCells(st,now)+'</div></div>';
    // cue bar

      '<button class="cuebar prompt" data-go="setup"><span class="ml" style="color:var(--hero);">⚡ SET YOUR CUE</span><span>“After ___, I do the ten.” A plan with a <em>when</em> actually happens — set it in Setup.</span></button>';
    // never-miss-twice
    var yday=addDays(now,-1),yk=dateKey(yday);
    var ydMissed=missedYesterday(st,now);
    var todayDone=st.sessions[tk]&&st.sessions[tk].warm;
    // only nag on a day the user can actually act on (a training day)
    // a returning user gets the welcome-back card instead — never both, never a
    // telling-off on top of a lapse
    var lapse=lapseInfo(st,now);
    var nmt=(ydMissed&&!todayDone&&!backfill&&!lapse&&isTrainingDay(plan,now))?'<div class="warnbanner">⚠ You missed yesterday — <b>never miss twice.</b> Today is non-negotiable: tick one drill.</div>':'';
    var body;
    if(focusKey==="rest"){
      body='<div class="divi"><span class="ml">'+(backfill?'YESTERDAY':'TODAY')+' ▸ REST</span></div>'+nmt+
        '<div class="card" style="text-align:center;padding:26px;"><div class="dsp" style="font-size:18px;">REST DAY</div>'+
        '<p style="color:var(--muted);font-size:13px;margin-top:6px;">'+F.drills[0].sub+'</p></div>';
    }else{
      var kx=(focusKey===plan.keystone)?" · KEYSTONE":"";
      var shown=drillList(F,plan),dstate=sess.drills||{};
      var rows="";
      for(var j=0;j<shown.length;j++){
        var d=shown[j].d,dix=shown[j].i,done=!!dstate[dix];
        rows+='<button class="drow'+(done?" done":"")+'" data-drill="'+dix+'" aria-pressed="'+(done?"true":"false")+'">'+
          '<span class="dbox">'+CHK+'</span>'+
          '<span class="dbody"><span class="dname">'+esc(d.t)+(d.core?'<span class="chip">CORE</span>':'')+'</span>'+
          (d.where?'<span class="dwhere" style="display:block;">▸ '+esc(d.where)+'</span>':'')+
          '<span class="dsub" style="display:block;">'+esc(d.sub)+'</span>'+
          '<span class="dmeas" style="display:block;">◎ '+esc(d.m)+'</span></span>'+
          (d.dur?'<span class="ddur">'+d.dur+'′</span>':'')+
          '</button>';
      }
      var fw=["—","OFF","SHAKY","OK","WARM","DIALLED"];
      var fcol=sess.feel>=4?"var(--good)":(sess.feel>0&&sess.feel<=2?"var(--bad)":"var(--muted)");
      var fbs="";for(var f=1;f<=5;f++)fbs+='<button class="fbtn'+(f<=sess.feel?" on":"")+'" data-feel="'+f+'" aria-pressed="'+(f<=sess.feel?"true":"false")+'" aria-label="Hand feel '+f+' of 5">'+f+'</button>';
      var bfBanner=backfill?'<div class="warnbanner" style="background:var(--surface);border-color:var(--line);border-left-color:var(--hero);color:var(--muted);">Editing <b style="color:var(--text);">yesterday</b> ('+act.toLocaleDateString(undefined,{weekday:"short",day:"numeric",month:"short"})+'). Your streak updates automatically.</div>':'';
      var canSession=!backfill&&focusKey!=="match";
      var totMin=0;for(var ti=0;ti<shown.length;ti++)totMin+=(shown[ti].d.dur||0);
      var undone=false;for(var ui=0;ui<shown.length;ui++)if(!dstate[shown[ui].i])undone=true;
      // one row, not a stack: primary session + the five-minute escape hatch side by side,
      // so Today keeps the single clean column the design intended
      var sessRow=(canSession&&undone)
        ?'<div class="sessrow"><button class="startsession" data-startsession="1">▸ START SESSION · '+totMin+' MIN</button>'+
         '<button class="quickbtn" data-quickstart="1">⚡ 5 MIN</button></div>'
        :'';
      // the reappraisal script is read BEFORE the gate checklist, as in the study
      var gate=(focusKey==="match"&&!backfill)?(reappraisalCard()+gateCard(sess)):"";
      body='<div class="divi"><span class="ml">'+(backfill?'YESTERDAY':'TODAY')+' ▸ '+esc(F.name).toUpperCase()+kx+'</span></div>'+
        bfBanner+nmt+gate+sessRow+
        '<div class="cols"><div><div class="dlist">'+rows+'</div></div>'+
        '<div><div class="card"><div class="ml">HAND FEEL</div><div class="feelgrid">'+fbs+'</div>'+
        '<div class="fword" style="color:'+fcol+';">'+(sess.feel?fw[sess.feel]:"LOG IT AFTER YOUR REPS")+'</div></div>'+
        '<div class="card rulecard" style="margin-top:12px;"><div class="ml" style="color:var(--hero);">THE RULE</div>'+
        '<p>Ten focused minutes beats a skipped hour. Tick one drill and today counts.</p></div></div></div>';
    }
    return hd+hero+lapseCard(lapse)+reviewCard(st,planReview(st,now))+cuebar+body+'<div class="motto">LOCKIN · TEN FOCUSED MINUTES BEATS A SKIPPED HOUR</div>';
  }

  /* ---------- PLAN ---------- */

  function mapPrep(st){

  // read-ahead depth for the Plan surfaces (drill library + protocol card):
